<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deep Thought — Revised Interface</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <style>
    :root {
      --bg:        #f5f4f0;   /* stone-tinted workspace */
      --paper:    #fbfaf6;
      --ink:      #1c1b18;
      --ink-soft: #4a4842;
      --rule:     #e6e3dc;
      --rule-2:   #d8d4cb;
      --sidebar:  #1a1814;
      --sidebar-2:#23211c;
      --accent:   oklch(0.74 0.14 70);   /* amber, reserved for LIVE */
      --accent-d: oklch(0.55 0.16 70);
    }
    html, body { font-family: 'IBM Plex Sans', system-ui, sans-serif; }
    body { background: var(--bg); color: var(--ink); font-family: 'IBM Plex Sans', system-ui, sans-serif; }
    h1, h2, h3, h4, h5, h6, p, span, a, button, label, input, textarea, select, li, div { font-family: inherit; }
    .mono { font-family: 'IBM Plex Mono', ui-monospace, monospace; font-feature-settings: 'tnum' 1, 'ss01' 1; }
    .smallcaps {
      font-family: 'IBM Plex Mono', ui-monospace, monospace;
      font-size: 10.5px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 500;
    }
    [x-cloak] { display: none !important; }
    .rule { border-color: var(--rule); }
    .rule-2 { border-color: var(--rule-2); }
    .paper { background: var(--paper); }
    .ink-soft { color: var(--ink-soft); }
    .ring-rule { box-shadow: inset 0 0 0 1px var(--rule); }
    /* live amber dot pulse */
    @keyframes livePulse {
      0%, 100% { box-shadow: 0 0 0 0 oklch(0.74 0.14 70 / .55); }
      50%      { box-shadow: 0 0 0 6px oklch(0.74 0.14 70 / 0); }
    }
    .live-dot {
      width: 8px; height: 8px; border-radius: 999px; background: var(--accent);
      animation: livePulse 1.8s ease-out infinite;
    }
    .dot { width: 7px; height: 7px; border-radius: 999px; display: inline-block; }
    /* Scenario tree connectors */
    .tree-line { background-image: linear-gradient(to bottom, var(--rule-2) 50%, transparent 50%); background-size: 1px 6px; }
    /* Subtle inset stripe for placeholder slots */
    .stripe {
      background-image: repeating-linear-gradient(135deg, #efece6 0 6px, #f5f3ee 6px 12px);
    }
    /* Scrollbar */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb { background: #d8d4cb; border-radius: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
    /* Crisp ring for buttons */
    .btn { display: inline-flex; align-items: center; gap: 6px; font-weight: 500; }
    .btn-primary { background: var(--ink); color: #fbfaf6; }
    .btn-primary:hover { background: #2b2924; }
    .btn-ghost { background: transparent; color: var(--ink); box-shadow: inset 0 0 0 1px var(--rule-2); }
    .btn-ghost:hover { background: #f0ede5; }
    .btn-accent { background: var(--accent-d); color: #fff; }
    .btn-accent:hover { background: oklch(0.5 0.16 70); }
    /* Nav active */
    .nav-link.active { background: #2e2b25; color: #fbfaf6; }
    .nav-link.active .nav-dot { background: var(--accent); }
    /* Tab strip (showcase switcher) */
    .stage-tab { padding: 6px 10px; border-radius: 6px; font-size: 12.5px; color: #6b675f; }
    .stage-tab.on { background: var(--ink); color: #fbfaf6; }
    /* Section header */
    .section-title { display: flex; align-items: center; gap: 8px; }
    .section-title::after {
      content: ''; flex: 1; height: 1px; background: var(--rule);
    }
    /* Generic tag pill */
    .pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 500;
      box-shadow: inset 0 0 0 1px var(--rule-2); background: #fbfaf6; color: var(--ink-soft);
    }
    .pill.mono { font-family: 'IBM Plex Mono', ui-monospace, monospace; font-size: 10.5px; }
    /* Status colours (deliberately muted) */
    .st-draft     { color: #6b675f; }
    .st-active    { color: var(--accent-d); }
    .st-paused    { color: #9a6b15; }
    .st-completed { color: #2f5b8a; }
    .bg-st-draft     { background: #ecebe5; color: #4a4842; }
    .bg-st-active    { background: oklch(0.74 0.14 70 / .15); color: var(--accent-d); box-shadow: inset 0 0 0 1px oklch(0.74 0.14 70 / .35); }
    .bg-st-paused    { background: #fef4e0; color: #8a5a0d; }
    .bg-st-completed { background: #e6eef8; color: #2f5b8a; }
    /* Tree node card */
    .node {
      background: var(--paper); box-shadow: inset 0 0 0 1px var(--rule);
      border-radius: 8px; padding: 10px 12px; transition: box-shadow .15s;
    }
    .node.current { box-shadow: inset 0 0 0 1px var(--accent-d), 0 0 0 2px oklch(0.74 0.14 70 / .18); background: #fff8ec; }
    .node.done { opacity: 0.72; }
    /* Briefing card (participant) */
    .briefing {
      background: var(--paper);
      box-shadow: inset 0 0 0 1px var(--rule), 0 1px 0 var(--rule-2);
      border-radius: 10px;
    }
    .briefing.released::before {
      content: ''; display: block; height: 3px; background: var(--accent); border-radius: 10px 10px 0 0;
    }
  </style>
</head>
<body class="min-h-screen">

<!-- ───────────────── Showcase chrome (switcher only) ───────────────── -->
<div x-data="shell()" x-init="init()" class="min-h-screen">

  <header class="border-b rule bg-[color:var(--paper)]">
    <div class="max-w-[1480px] mx-auto px-6 h-12 flex items-center gap-4">
      <span class="smallcaps text-stone-500">Deep Thought · Revised Interface</span>
      <nav class="ml-6 flex items-center gap-1">
        <button class="stage-tab" :class="screen==='console' && 'on'" @click="setScreen('console')">Command center</button>
        <button class="stage-tab" :class="screen==='scenarios' && 'on'" @click="setScreen('scenarios')">Scenarios</button>
        <button class="stage-tab" :class="screen==='scenario' && 'on'" @click="setScreen('scenario')">Scenario detail</button>
        <button class="stage-tab" :class="screen==='facilitate' && 'on'" @click="setScreen('facilitate')">Facilitate · Live</button>
        <button class="stage-tab" :class="screen==='participate' && 'on'" @click="setScreen('participate')">Participate</button>
        <button class="stage-tab" :class="screen==='comms' && 'on'" @click="setScreen('comms')">Communications</button>
      </nav>
      <div class="ml-auto smallcaps text-stone-400">v2 · prototype</div>
    </div>
  </header>

  <!-- ───────────────── App shell (sidebar + workspace) ───────────────── -->
  <div class="flex" style="min-height: calc(100vh - 48px);">

    <!-- Sidebar -->
    <aside class="w-56 shrink-0 flex flex-col text-stone-300" style="background: var(--sidebar);">
      <div class="px-5 pt-5 pb-4 flex items-center gap-2.5">
        <div class="h-7 w-7 rounded-md flex items-center justify-center mono text-[13px] font-semibold"
             style="background: var(--accent); color:#1a1814;">42</div>
        <div>
          <div class="text-stone-50 text-[14px] font-semibold leading-tight">Deep Thought</div>
          <div class="smallcaps text-stone-500 leading-tight">TTX control</div>
        </div>
      </div>

      <div class="px-3 py-1 smallcaps text-stone-500">Workspace</div>
      <nav class="px-2 flex flex-col gap-0.5 text-[13.5px]">
        <a @click.prevent="setScreen('console')" href="#console"
           class="nav-link rounded-md px-3 py-1.5 flex items-center gap-2 cursor-pointer"
           :class="screen==='console' && 'active'">
          <span class="nav-dot dot bg-stone-500"></span>Command center
        </a>
        <a @click.prevent="setScreen('scenarios')" href="#scenarios"
           class="nav-link rounded-md px-3 py-1.5 flex items-center gap-2 cursor-pointer"
           :class="screen==='scenarios' && 'active'">
          <span class="nav-dot dot bg-stone-500"></span>Scenarios
          <span class="ml-auto mono text-stone-500 text-[11px]">4</span>
        </a>
        <a @click.prevent="setScreen('facilitate')" href="#facilitate"
           class="nav-link rounded-md px-3 py-1.5 flex items-center gap-2 cursor-pointer"
           :class="(screen==='facilitate' || screen==='participate') && 'active'">
          <span class="nav-dot dot bg-stone-500"></span>Exercises
          <span class="ml-auto pill mono"
                style="background: oklch(0.74 0.14 70 / .15); color: var(--accent-d); box-shadow: inset 0 0 0 1px oklch(0.74 0.14 70 / .35);">
            <span class="live-dot"></span>1 live
          </span>
        </a>
        <a @click.prevent="setScreen('comms')" href="#comms"
           class="nav-link rounded-md px-3 py-1.5 flex items-center gap-2 cursor-pointer"
           :class="screen==='comms' && 'active'">
          <span class="nav-dot dot bg-stone-500"></span>Communications
          <span class="ml-auto mono text-stone-500 text-[11px]">2</span>
        </a>
      </nav>

      <div class="px-3 mt-5 py-1 smallcaps text-stone-500">Live now</div>
      <div class="px-3">
        <a @click.prevent="setScreen('facilitate')" href="#facilitate"
           class="block rounded-md p-3 cursor-pointer hover:bg-stone-800/60"
           style="background: var(--sidebar-2);">
          <div class="flex items-center gap-2">
            <span class="live-dot"></span>
            <span class="text-stone-100 text-[13px] font-medium truncate">Friday Live</span>
          </div>
          <div class="mono text-[11px] text-stone-500 mt-1">EX-12 · node inj_03</div>
          <div class="mono text-[11px] text-stone-400 mt-0.5">9/11 online · 47m elapsed</div>
        </a>
      </div>

      <div class="mt-auto p-3 border-t border-stone-800/70">
        <div class="flex items-center gap-2.5">
          <div class="h-8 w-8 rounded-full grid place-items-center text-[12px] font-semibold"
               style="background: oklch(0.74 0.14 70 / .25); color: var(--accent);">TA</div>
          <div class="min-w-0">
            <div class="text-stone-100 text-[13px] leading-tight truncate">T. Aldis</div>
            <div class="smallcaps text-stone-500 leading-tight">Facilitator</div>
          </div>
          <button class="ml-auto smallcaps text-stone-500 hover:text-stone-200">Sign out</button>
        </div>
      </div>
    </aside>

    <!-- Workspace -->
    <main class="flex-1 min-w-0">
      <div x-show="screen==='console'"     x-cloak><div id="screen-console"></div></div>
      <div x-show="screen==='scenarios'"   x-cloak><div id="screen-scenarios"></div></div>
      <div x-show="screen==='scenario'"    x-cloak><div id="screen-scenario"></div></div>
      <div x-show="screen==='facilitate'"  x-cloak><div id="screen-facilitate"></div></div>
      <div x-show="screen==='participate'" x-cloak><div id="screen-participate"></div></div>
      <div x-show="screen==='comms'"       x-cloak><div id="screen-comms"></div></div>
    </main>
  </div>
</div>

<script src="app.js"></script>
<script src="screens.js"></script>
</body>
</html>
