<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}Deep Thought{% endblock %}</title>
  <link rel="stylesheet" href="/static/css/output.css" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js"></script>
  <script>
    (() => {
      const theme = localStorage.getItem('dt_theme') || 'system';
      const accent = localStorage.getItem('dt_accent');
      const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.dataset.theme = theme === 'system' ? (prefersDark ? 'dark' : 'light') : theme;
      if (accent) document.documentElement.style.setProperty('--accent', accent);
    })();
  </script>
  <style>
    :root {
      --bg:        #f7f6f2;
      --paper:     #fffefa;
      --ink:       #1c1b18;
      --ink-soft:  #4a4842;
      --muted:     #777269;
      --rule:      #ebe8e0;
      --rule-2:    #ddd8ce;
      --sidebar:   #1a1814;
      --sidebar-2: #23211c;
      --accent:    oklch(0.74 0.14 70);
      --accent-d:  oklch(0.55 0.16 70);
    }
    html[data-theme="dark"] {
      --bg:        #151512;
      --paper:     #1f1e1a;
      --ink:       #f3f0e8;
      --ink-soft:  #d3cec2;
      --muted:     #a6a095;
      --rule:      #343128;
      --rule-2:    #4a463a;
      --sidebar:   #0f0e0c;
      --sidebar-2: #1b1915;
      --accent-d:  oklch(0.78 0.13 70);
    }
    html, body { font-family: 'IBM Plex Sans', system-ui, sans-serif; }
    body { background: var(--bg); color: var(--ink); }

    [x-cloak] { display: none !important; }

    /* Typography */
    .smallcaps {
      font-family: 'IBM Plex Mono', ui-monospace, monospace;
      font-size: 10.5px;
      letter-spacing: 0.07em;
      text-transform: uppercase;
      font-weight: 500;
    }
    .mono {
      font-family: 'IBM Plex Mono', ui-monospace, monospace;
      font-feature-settings: 'tnum' 1, 'ss01' 1;
    }

    /* Borders */
    .rule   { border-color: var(--rule); }
    .rule-2 { border-color: var(--rule-2); }

    /* Backgrounds */
    .paper    { background: var(--paper); }
    .ink-soft { color: var(--ink-soft); }

    /* Inset ring */
    .ring-rule { box-shadow: inset 0 0 0 1px var(--rule); }

    /* Pill / tag chip */
    .pill {
      display: inline-flex; align-items: center; gap: 6px;
      padding: 2px 7px; border-radius: 999px;
      font-size: 11px; font-weight: 500;
      box-shadow: inset 0 0 0 1px var(--rule-2);
      background: var(--paper); color: var(--ink-soft);
    }
    .pill.mono { font-family: 'IBM Plex Mono', ui-monospace, monospace; font-size: 10.5px; }

    /* Buttons */
    .btn { display: inline-flex; align-items: center; gap: 6px; font-weight: 500; border-radius: 6px; cursor: pointer; transition: background .12s, box-shadow .12s, color .12s; }
    .btn-primary { background: #292720; color: var(--paper); box-shadow: inset 0 0 0 1px #292720; }
    .btn-primary:hover { background: #37342c; }
    .btn-ghost { background: transparent; color: var(--ink); box-shadow: inset 0 0 0 1px var(--rule-2); }
    .btn-ghost:hover { background: #f3f0e9; }
    .btn-accent { background: var(--accent-d); color: #fff; }
    .btn-accent:hover { background: oklch(0.5 0.16 70); }

    /* Dots */
    .dot { width: 7px; height: 7px; border-radius: 999px; display: inline-block; flex-shrink: 0; }

    /* Pulsing amber live dot */
    @keyframes livePulse {
      0%, 100% { box-shadow: 0 0 0 0 oklch(0.74 0.14 70 / .55); }
      50%       { box-shadow: 0 0 0 6px oklch(0.74 0.14 70 / 0); }
    }
    .live-dot {
      width: 8px; height: 8px; border-radius: 999px;
      background: var(--accent);
      animation: livePulse 1.8s ease-out infinite;
      display: inline-block; flex-shrink: 0;
    }

    /* Status badge fills */
    .bg-st-draft     { background: #ecebe5; color: #4a4842; }
    .bg-st-active    { background: oklch(0.74 0.14 70 / .15); color: var(--accent-d); box-shadow: inset 0 0 0 1px oklch(0.74 0.14 70 / .35); }
    .bg-st-paused    { background: #fef4e0; color: #8a5a0d; }
    .bg-st-completed { background: #e6eef8; color: #2f5b8a; }

    /* Section title with trailing rule */
    .section-title { display: flex; align-items: center; gap: 8px; }
    .section-title::after { content: ''; flex: 1; height: 1px; background: var(--rule); }

    /* Inject tree node */
    .node {
      background: var(--paper);
      box-shadow: inset 0 0 0 1px var(--rule);
      border-radius: 8px; padding: 10px 12px;
      transition: box-shadow .15s;
    }
    .node.current {
      box-shadow: inset 0 0 0 1px var(--accent-d), 0 0 0 2px oklch(0.74 0.14 70 / .18);
      background: #fff8ec;
    }
    .node.done { opacity: 0.65; }

    /* Participant briefing card */
    .briefing {
      background: var(--paper);
      box-shadow: inset 0 0 0 1px var(--rule), 0 1px 0 var(--rule-2);
      border-radius: 10px;
    }
    .briefing.released::before {
      content: ''; display: block; height: 3px;
      background: var(--accent); border-radius: 10px 10px 0 0;
    }

    /* Hatched placeholder for ad-hoc inject slot */
    .stripe {
      background-image: repeating-linear-gradient(135deg, #efece6 0 6px, #f5f3ee 6px 12px);
    }

    /* Sidebar active state */
    .nav-link { transition: background .1s, color .1s; }
    .nav-link.active { background: #29261f; color: #fbfaf6; }
    .nav-link.active .nav-dot { background: var(--accent) !important; }

    /* Calmer app shell */
    .workspace {
      width: min(1180px, calc(100% - 32px));
      margin-inline: auto;
      padding: 28px 0 40px;
    }
    .page-head {
      display: flex; align-items: flex-end; justify-content: space-between;
      gap: 20px; margin-bottom: 22px;
    }
    .page-title {
      font-size: 25px; line-height: 1.15; font-weight: 600;
      letter-spacing: 0;
    }
    .surface {
      background: var(--paper);
      box-shadow: inset 0 0 0 1px var(--rule);
      border-radius: 8px;
    }
    .quiet-row:hover { background: #faf8f1; }
    html[data-theme="dark"] .quiet-row:hover { background: #27241f; }
    html[data-theme="dark"] .btn-ghost:hover { background: #2a2721; }
    html[data-theme="dark"] input,
    html[data-theme="dark"] select,
    html[data-theme="dark"] textarea {
      background: #171613 !important;
      color: var(--ink);
    }
    @media (max-width: 760px) {
      body { display: block !important; }
      aside[x-data] {
        width: 100% !important;
        min-height: auto !important;
        height: auto !important;
        position: static !important;
      }
      .workspace {
        width: min(100% - 24px, 1180px);
        padding: 20px 0 32px;
      }
      .page-head {
        align-items: flex-start;
        flex-direction: column;
        gap: 12px;
      }
    }

    /* Scrollbars */
    ::-webkit-scrollbar { width: 10px; height: 10px; }
    ::-webkit-scrollbar-thumb { background: #d8d4cb; border-radius: 8px; }
    ::-webkit-scrollbar-track { background: transparent; }
  </style>
</head>
<body class="min-h-screen flex">

  <!-- Sidebar — hidden on auth pages (user is null) -->
  <aside x-data="sidebarNav()" x-init="init()"
    x-show="!!user" x-cloak
    class="w-52 shrink-0 flex flex-col text-stone-300"
    style="background: var(--sidebar); min-height: 100vh; position: sticky; top: 0; height: 100vh; overflow-y: auto;">

    <!-- Logo -->
    <div class="px-5 pt-5 pb-4 flex items-center gap-2.5">
      <div class="h-7 w-7 rounded-md flex items-center justify-center mono text-[13px] font-semibold"
           style="background: var(--accent); color: #1a1814;">42</div>
      <div>
        <div class="text-stone-50 text-[14px] font-semibold leading-tight">Deep Thought</div>
        <div class="smallcaps text-stone-500 leading-tight">TTX control</div>
      </div>
    </div>

    <!-- Navigation -->
    <div class="px-3 py-1 smallcaps text-stone-500">Main</div>
    <nav class="px-2 flex flex-col gap-0.5 text-[13.5px]">
      <a href="/dashboard"
         class="nav-link rounded-md px-3 py-1.5 flex items-center gap-2 hover:bg-stone-800/50"
         :class="isActive('/dashboard') && 'active'">
        <span class="nav-dot dot bg-stone-600"></span>Home
      </a>
      <a href="/scenarios"
         x-show="user?.actual_role === 'facilitator' || user?.role === 'facilitator'"
         class="nav-link rounded-md px-3 py-1.5 flex items-center gap-2 hover:bg-stone-800/50"
         :class="isActive('/scenarios') && 'active'">
        <span class="nav-dot dot bg-stone-600"></span>Scenarios
        <span x-show="scenarioCount" class="ml-auto mono text-stone-500 text-[11px]" x-text="scenarioCount"></span>
      </a>
      <a href="/exercises"
         class="nav-link rounded-md px-3 py-1.5 flex items-center gap-2 hover:bg-stone-800/50"
         :class="exercisesActive && 'active'">
        <span class="nav-dot dot bg-stone-600"></span>Exercises
        <template x-if="liveExercise">
          <span class="ml-auto mono text-[10.5px]" style="color: var(--accent);">
            live
          </span>
        </template>
      </a>
      <a :href="liveExercise ? '/exercises/' + liveExercise.id + '/communications' : '/exercises'"
         class="nav-link rounded-md px-3 py-1.5 flex items-center gap-2 hover:bg-stone-800/50"
         :class="currentPath.includes('/communications') && 'active'">
        <span class="nav-dot dot bg-stone-600"></span>Comms
      </a>
    </nav>

    <div class="px-3 pt-4 pb-1 smallcaps text-stone-500">Support</div>
    <nav class="px-2 flex flex-col gap-0.5 text-[13.5px]">
      <a href="/help"
         class="nav-link rounded-md px-3 py-1.5 flex items-center gap-2 hover:bg-stone-800/50"
         :class="isActive('/help') && 'active'">
        <span class="nav-dot dot bg-stone-600"></span>Help
      </a>
      <a href="/settings"
         class="nav-link rounded-md px-3 py-1.5 flex items-center gap-2 hover:bg-stone-800/50"
         :class="isActive('/settings') && 'active'">
        <span class="nav-dot dot bg-stone-600"></span>Settings
      </a>
    </nav>

    <!-- Live now widget -->
    <template x-if="liveExercise">
      <div class="px-3 mt-4">
        <a :href="'/exercises/' + liveExercise.id + (user?.role === 'facilitator' ? '/facilitate' : '/participate')"
           class="block rounded-md p-2.5 hover:bg-stone-800/60"
           style="background: var(--sidebar-2);">
          <div class="flex items-center gap-2">
            <span class="text-stone-100 text-[13px] font-medium truncate" x-text="liveExercise.title"></span>
          </div>
          <div class="mono text-[11px] text-stone-500 mt-1"
               x-text="'Live exercise · EX-' + String(liveExercise.id).padStart(2,'0')">
          </div>
        </a>
      </div>
    </template>

    <!-- User profile -->
    <div class="mt-auto p-3 border-t border-stone-800/70">
      <div class="flex items-center gap-2.5">
        <div class="h-8 w-8 rounded-full grid place-items-center text-[12px] font-semibold shrink-0"
             style="background: oklch(0.74 0.14 70 / .25); color: var(--accent);"
             x-text="initials"></div>
        <div class="min-w-0 flex-1">
          <div class="text-stone-100 text-[13px] leading-tight truncate"
               x-text="user?.display_name || user?.email"></div>
          <div class="smallcaps text-stone-500 leading-tight" x-text="user?.role"></div>
          <div x-show="user?.actual_role && user.actual_role !== user.role"
               class="smallcaps leading-tight" style="color: var(--accent);"
               x-text="user ? 'Previewing as ' + user.role : ''"></div>
        </div>
        <button @click="logout()" class="ml-auto smallcaps text-stone-500 hover:text-stone-200 shrink-0">Sign out</button>
      </div>
    </div>
  </aside>

  <!-- Main workspace -->
  <main class="flex-1 min-w-0">
    {% block content %}{% endblock %}
  </main>

  <script>
    // ── Shared auth helpers ──────────────────────────────────────────────────

    function getToken() {
      return localStorage.getItem('dt_token');
    }

    async function apiFetch(path, options = {}) {
      const token = getToken();
      const headers = { 'Content-Type': 'application/json', ...(options.headers || {}) };
      if (token) headers['Authorization'] = 'Bearer ' + token;
      const apiPath = path.startsWith('/api/') ? path : '/api' + path;
      let resp;
      try {
        resp = await fetch(apiPath, { ...options, headers });
      } catch {
        return null;
      }
      if (resp.status === 401) { window.location.href = '/login'; return null; }
      return resp;
    }

    async function readJson(resp, fallback = null) {
      if (!resp || !resp.ok) return fallback;
      try {
        return await resp.json();
      } catch {
        return fallback;
      }
    }

    function applyTheme(theme, accent) {
      localStorage.setItem('dt_theme', theme);
      if (accent) {
        localStorage.setItem('dt_accent', accent);
        document.documentElement.style.setProperty('--accent', accent);
      }
      const prefersDark = window.matchMedia && window.matchMedia('(prefers-color-scheme: dark)').matches;
      document.documentElement.dataset.theme = theme === 'system' ? (prefersDark ? 'dark' : 'light') : theme;
    }

    // ── Format helpers ───────────────────────────────────────────────────────

    function fmtElapsed(isoStr) {
      if (!isoStr) return '—';
      const s = Math.max(0, Math.floor((Date.now() - new Date(isoStr)) / 1000));
      const h = Math.floor(s / 3600), m = Math.floor((s % 3600) / 60);
      return h > 0 ? `${h}h ${String(m).padStart(2, '0')}m` : `${m}m`;
    }
    function fmtAgo(isoStr) {
      if (!isoStr) return '—';
      const diff = (Date.now() - new Date(isoStr)) / 1000;
      if (diff < 60)    return `${Math.floor(diff)}s ago`;
      if (diff < 3600)  return `${Math.floor(diff / 60)}m ago`;
      if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
      return `${Math.floor(diff / 86400)}d ago`;
    }
    function fmtTime(isoStr) {
      if (!isoStr) return '—';
      return new Date(isoStr).toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
    }
    function teamColor(id) {
      const map = {
        it_ops: 'bg-sky-100/70 text-sky-800 ring-sky-200',
        legal:  'bg-violet-100/70 text-violet-800 ring-violet-200',
        exec:   'bg-amber-100/70 text-amber-900 ring-amber-200',
        comms:  'bg-emerald-100/70 text-emerald-800 ring-emerald-200',
      };
      return map[id] || 'bg-stone-100 text-stone-700 ring-stone-200';
    }
    function stateBadge(state) {
      const map = {
        active:    `<span class="pill bg-st-active"><span class="live-dot"></span>active</span>`,
        paused:    `<span class="pill bg-st-paused"><span class="dot" style="background:#c08a26"></span>paused</span>`,
        draft:     `<span class="pill bg-st-draft"><span class="dot" style="background:#9a958a"></span>draft</span>`,
        completed: `<span class="pill bg-st-completed"><span class="dot" style="background:#5b86b8"></span>completed</span>`,
      };
      return map[state] || '';
    }

    // ── Sidebar nav component ────────────────────────────────────────────────

    function sidebarNav() {
      return {
        user: null,
        liveExercise: null,
        scenarioCount: null,
        currentPath: window.location.pathname,

        async init() {
          const token = getToken();
          if (!token) return;
          const [mr, er] = await Promise.all([
            apiFetch('/auth/me'),
            apiFetch('/exercises'),
          ]);
          this.user = await readJson(mr);
          if (er && er.ok) {
            const exs = await readJson(er, []);
            this.liveExercise = exs.find(e => e.state === 'active') || null;
          }
          if (this.user?.role === 'facilitator') {
            const sr = await apiFetch('/scenarios');
            const scenarios = await readJson(sr, []);
            this.scenarioCount = scenarios.length > 0 ? scenarios.length : null;
          }
        },

        get initials() {
          const name = this.user?.display_name || this.user?.email || '';
          return name.split(/[\s@]/).filter(Boolean).map(x => x[0]).join('').slice(0, 2).toUpperCase();
        },

        get exercisesActive() {
          return this.currentPath.startsWith('/exercises') &&
            !this.currentPath.includes('/communications');
        },

        isActive(path) {
          return this.currentPath === path || this.currentPath.startsWith(path + '/');
        },

        logout() {
          localStorage.removeItem('dt_token');
          document.cookie = 'access_token=; Max-Age=0; path=/';
          window.location.href = '/login';
        }
      }
    }
  </script>

  {% block scripts %}{% endblock %}
</body>
</html>
