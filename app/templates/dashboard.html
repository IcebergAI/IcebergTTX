{% extends "base.html" %}
{% block title %}Home — IcebergTTX{% endblock %}

{% block content %}
<div x-data="dashboard()" class="workspace">

  <div class="page-head">
    <div>
      <h1 class="page-title">Home</h1>
      <p class="text-[13.5px] text-muted mt-1">Start from the one exercise that needs attention.</p>
    </div>
    <div class="flex items-center gap-2" x-show="canManageScenarios">
      <a href="/scenarios/new" class="btn btn-ghost h-8 px-3 text-[13px]">Scenario</a>
      <a href="/exercises" class="btn btn-primary h-8 px-3 text-[13px]">New exercise</a>
    </div>
  </div>

  <!-- Live exercise focus card -->
  <template x-if="liveExercise">
    <div class="surface p-5 mb-8">
      <div class="flex items-center gap-6">
        <div class="min-w-0 flex-1">
          <div class="smallcaps" style="color: var(--accent-d);">Live exercise</div>
          <h2 class="text-[21px] font-semibold mt-1 tracking-tight" x-text="liveExercise.title"></h2>
          <p class="text-muted text-[13.5px] mt-0.5"
             x-text="(liveExercise.scenario_title || '') + (liveExercise.started_at ? ' · started ' + fmtTime(liveExercise.started_at) : '')"></p>
          <div class="flex items-center gap-4 mt-4 text-[12.5px] text-muted">
            <span><span class="mono text-ink" x-text="liveElapsed"></span> elapsed</span>
            <span x-show="liveExercise.current_node_id">Current node <span class="mono text-ink" x-text="liveExercise.current_node_id"></span></span>
          </div>
        </div>
        <a :href="isF ? '/exercises/' + liveExercise.id + '/facilitate' : '/exercises/' + liveExercise.id + '/participate'"
           class="btn btn-primary h-9 px-4 text-[13px] shrink-0">Open</a>
      </div>
    </div>
  </template>

  <!-- No live exercise placeholder -->
  <template x-if="!liveExercise && !loading">
    <div class="surface p-5 mb-8">
      <p class="text-muted text-[13.5px]">No active exercise. <a href="/exercises" class="underline hover:text-ink-soft">Create or open an exercise.</a></p>
    </div>
  </template>

  <!-- Two-column: exercises + scenarios -->
  <div class="grid grid-cols-5 gap-6">
    <div :class="canManageScenarios ? 'col-span-3' : 'col-span-5'">
      <div class="section-title mb-3">
        <h3 class="smallcaps text-muted">Exercises</h3>
        <a href="/exercises" class="smallcaps text-faint hover:text-ink-soft">View all</a>
      </div>
      <div class="surface divide-y rule overflow-hidden">
        <template x-if="loading">
          <div class="px-5 py-4 text-sm text-faint">Loading…</div>
        </template>
        <template x-if="!loading && exercises.length === 0">
          <div class="px-5 py-6 text-center text-faint text-[13px]">
            No exercises yet. <a href="/exercises" class="underline hover:text-ink-soft">Create one.</a>
          </div>
        </template>
        <template x-for="ex in exercises.slice(0, 5)" :key="ex.id">
          <div class="px-4 py-3 flex items-center gap-4 quiet-row">
            <div class="min-w-0 flex-1">
              <div class="flex items-center gap-2">
                <span class="text-[14px] font-medium truncate" x-text="ex.title"></span>
                <span class="pill" :class="stateBadgeClass(ex.state)">
                  <span x-show="ex.state === 'active'" class="live-dot"></span>
                  <span x-show="ex.state !== 'active'" class="dot" :class="stateDotClass(ex.state)"></span>
                  <span x-text="ex.state"></span>
                </span>
              </div>
              <div class="mono text-[11.5px] text-muted mt-0.5"
                   x-text="'EX-' + padId(ex.id, 3)"></div>
            </div>
            <div class="text-right shrink-0">
              <div class="mono text-[12px] text-ink-soft" x-text="ex.started_at ? fmtElapsed(ex.started_at) : '—'"></div>
            </div>
            <a :href="isF ? '/exercises/' + ex.id + '/facilitate' : '/exercises/' + ex.id + '/participate'"
               class="btn btn-ghost h-7 px-2.5 text-[12px]">Open</a>
          </div>
        </template>
      </div>
    </div>

    <div class="col-span-2" x-show="canManageScenarios">
      <div class="section-title mb-3">
        <h3 class="smallcaps text-muted">Scenario library</h3>
        <a href="/scenarios" class="smallcaps text-faint hover:text-ink-soft">View all</a>
      </div>
      <div class="surface divide-y rule overflow-hidden">
        <template x-if="!loading && scenarios.length === 0">
          <div class="px-5 py-6 text-center text-faint text-[13px]">
            No scenarios. <a href="/scenarios/new" class="underline hover:text-ink-soft">Create one.</a>
          </div>
        </template>
        <template x-for="s in scenarios.slice(0, 5)" :key="s.id">
          <a :href="'/scenarios/' + s.id" class="block px-4 py-3 quiet-row">
            <div class="text-[13.5px] font-medium truncate" x-text="s.title"></div>
            <div class="flex items-center gap-2 mt-1">
              <span class="mono text-[11px] text-muted"
                    x-text="(s.inject_count || 0) + ' injects'"></span>
              <span class="mono text-[11px] text-faint" x-text="'· ' + fmtAgo(s.updated_at)"></span>
            </div>
          </a>
        </template>
      </div>
    </div>
  </div>

</div>
{% endblock %}
