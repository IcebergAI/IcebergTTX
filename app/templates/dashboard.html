{% extends "base.html" %}
{% block title %}Command center — Deep Thought{% endblock %}

{% block content %}
<div x-data="dashboard()" x-init="init()" class="px-8 py-6 max-w-[1240px]">

  <div class="flex items-end justify-between mb-6">
    <div>
      <div class="smallcaps text-stone-500">Workspace</div>
      <h1 class="text-[26px] font-semibold tracking-tight leading-tight mt-1">Command center</h1>
    </div>
    <div class="flex items-center gap-2" x-show="isF">
      <a href="/scenarios/new" class="btn btn-ghost h-8 px-3 text-[13px]">Import scenario</a>
      <a href="/exercises" class="btn btn-primary h-8 px-3 text-[13px]">+ New exercise</a>
    </div>
  </div>

  <!-- Live exercise hero card -->
  <template x-if="liveExercise">
    <div class="briefing released rounded-[10px] p-5 mb-7">
      <div class="flex items-start gap-6">
        <div class="min-w-0 flex-1">
          <div class="flex items-center gap-2">
            <span class="pill bg-st-active"><span class="live-dot"></span>Live</span>
            <span class="mono text-[11.5px] text-stone-500" x-text="'EX-' + String(liveExercise.id).padStart(2,'0')"></span>
            <template x-if="liveExercise.current_node_id">
              <span class="flex items-center gap-1 text-stone-300">
                <span>·</span>
                <span class="mono text-[11.5px] text-stone-500" x-text="'node ' + liveExercise.current_node_id"></span>
              </span>
            </template>
          </div>
          <h2 class="text-[20px] font-semibold mt-2 tracking-tight" x-text="liveExercise.title"></h2>
          <p class="text-stone-500 text-[13.5px] mt-0.5"
             x-text="(liveExercise.scenario_title || '') + (liveExercise.started_at ? ' · started ' + fmtTime(liveExercise.started_at) : '')"></p>

          <div class="grid grid-cols-4 gap-6 mt-5">
            <div>
              <div class="smallcaps text-stone-500">Elapsed</div>
              <div class="mono text-[22px] mt-0.5" x-text="liveElapsed"></div>
            </div>
            <div>
              <div class="smallcaps text-stone-500">Exercises</div>
              <div class="mono text-[22px] mt-0.5">
                <span x-text="exercises.filter(e => e.state === 'active').length"></span>
                <span class="text-stone-400 text-[15px]" x-text="' / ' + exercises.length"></span>
              </div>
            </div>
            <div>
              <div class="smallcaps text-stone-500">Scenarios</div>
              <div class="mono text-[22px] mt-0.5" x-text="scenarios.length"></div>
            </div>
            <div>
              <div class="smallcaps text-stone-500">Paused</div>
              <div class="mono text-[22px] mt-0.5" x-text="exercises.filter(e => e.state === 'paused').length"></div>
            </div>
          </div>
        </div>

        <div class="w-px self-stretch border-l rule"></div>

        <div class="w-[220px] shrink-0">
          <div class="smallcaps text-stone-500 mb-2">Recent exercises</div>
          <div class="space-y-2">
            <template x-for="ex in exercises.slice(0, 4)" :key="ex.id">
              <div class="flex items-center gap-2 text-[12.5px]">
                <span x-html="stateBadge(ex.state)"></span>
                <span class="truncate text-stone-700" x-text="ex.title"></span>
              </div>
            </template>
          </div>
          <a :href="'/exercises/' + liveExercise.id + '/facilitate'"
             class="inline-flex items-center gap-1 mt-4 text-[13px] font-medium"
             style="color: var(--accent-d);">
            Open console <span class="mono">→</span>
          </a>
        </div>
      </div>
    </div>
  </template>

  <!-- No live exercise placeholder -->
  <template x-if="!liveExercise && !loading">
    <div class="ring-rule rounded-[10px] p-5 mb-7 text-center" style="background: var(--paper);">
      <p class="text-stone-400 text-[13.5px]">No active exercise. <a href="/exercises" class="underline hover:text-stone-700">Start one →</a></p>
    </div>
  </template>

  <!-- Two-column: exercises + scenarios -->
  <div class="grid grid-cols-5 gap-7">
    <div class="col-span-3">
      <div class="section-title mb-3">
        <h3 class="smallcaps text-stone-500">Exercises</h3>
        <a href="/exercises" class="smallcaps text-stone-400 hover:text-stone-700">View all</a>
      </div>
      <div class="paper ring-rule rounded-lg divide-y rule overflow-hidden">
        <template x-if="loading">
          <div class="px-5 py-4 text-sm text-stone-400">Loading…</div>
        </template>
        <template x-if="!loading && exercises.length === 0">
          <div class="px-5 py-6 text-center text-stone-400 text-[13px]">
            No exercises yet. <a href="/exercises" class="underline hover:text-stone-700">Create one.</a>
          </div>
        </template>
        <template x-for="ex in exercises.slice(0, 5)" :key="ex.id">
          <div class="px-4 py-3 flex items-center gap-4">
            <div class="min-w-0 flex-1">
              <div class="flex items-center gap-2">
                <span class="text-[14px] font-medium truncate" x-text="ex.title"></span>
                <span x-html="stateBadge(ex.state)"></span>
              </div>
              <div class="mono text-[11.5px] text-stone-500 mt-0.5"
                   x-text="'EX-' + String(ex.id).padStart(3,'0')"></div>
            </div>
            <div class="text-right shrink-0">
              <div class="mono text-[12px] text-stone-700" x-text="ex.started_at ? fmtElapsed(ex.started_at) : '—'"></div>
            </div>
            <a :href="isF ? '/exercises/' + ex.id + '/facilitate' : '/exercises/' + ex.id + '/participate'"
               class="btn btn-ghost h-7 px-2.5 text-[12px]">Open</a>
          </div>
        </template>
      </div>
    </div>

    <div class="col-span-2">
      <div class="section-title mb-3">
        <h3 class="smallcaps text-stone-500">Scenario library</h3>
        <a href="/scenarios" class="smallcaps text-stone-400 hover:text-stone-700">View all</a>
      </div>
      <div class="paper ring-rule rounded-lg divide-y rule overflow-hidden">
        <template x-if="!loading && scenarios.length === 0">
          <div class="px-5 py-6 text-center text-stone-400 text-[13px]">
            No scenarios. <a href="/scenarios/new" class="underline hover:text-stone-700">Create one.</a>
          </div>
        </template>
        <template x-for="s in scenarios.slice(0, 5)" :key="s.id">
          <a :href="'/scenarios/' + s.id" class="block px-4 py-3 hover:bg-stone-50/80">
            <div class="text-[13.5px] font-medium truncate" x-text="s.title"></div>
            <div class="flex items-center gap-2 mt-1">
              <span class="mono text-[11px] text-stone-500"
                    x-text="(s.definition?.injects?.length || 0) + ' injects'"></span>
              <span class="mono text-[11px] text-stone-400" x-text="'· ' + fmtAgo(s.updated_at)"></span>
            </div>
          </a>
        </template>
      </div>
    </div>
  </div>

</div>
{% endblock %}

{% block scripts %}
<script>
function dashboard() {
  return {
    loading: true,
    scenarios: [],
    exercises: [],
    isF: false,
    liveElapsedInterval: null,
    liveElapsed: '—',

    get liveExercise() {
      return this.exercises.find(e => e.state === 'active') || null;
    },

    async init() {
      const [mr, sr, er] = await Promise.all([
        apiFetch('/auth/me'),
        apiFetch('/scenarios'),
        apiFetch('/exercises'),
      ]);
      if (mr && mr.ok) {
        const me = await mr.json();
        this.isF = me.role === 'facilitator';
      }
      if (sr && sr.ok) this.scenarios = await sr.json();
      if (er && er.ok) this.exercises = await er.json();
      this.loading = false;

      if (this.liveExercise) {
        this.liveElapsed = fmtElapsed(this.liveExercise.started_at);
        this.liveElapsedInterval = setInterval(() => {
          if (this.liveExercise) this.liveElapsed = fmtElapsed(this.liveExercise.started_at);
        }, 10000);
      }
    },

    stateBadge(state) { return stateBadge(state); },
    fmtElapsed(s)     { return fmtElapsed(s); },
    fmtAgo(s)         { return fmtAgo(s); },
    fmtTime(s)        { return fmtTime(s); },
  }
}
</script>
{% endblock %}
