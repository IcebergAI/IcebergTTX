{% extends "base.html" %}
{% block title %}Communications — IcebergTTX{% endblock %}

{% block content %}
<style>
  .comm-filter-control {
    height: 34px;
    background: var(--paper-soft);
    color: var(--ink-soft);
    border-radius: 6px;
    box-shadow: inset 0 0 0 1px var(--rule-2);
    font-size: 13px;
    outline: none;
    padding: 0 10px;
  }

  .comm-filter-control::placeholder {
    color: var(--muted);
  }

  .comm-filter-control:focus {
    box-shadow: inset 0 0 0 1px var(--accent-d), 0 0 0 2px rgba(191, 124, 22, .18);
  }

  .comm-direction-filter {
    flex: 0 0 104px;
    font-size: 12px;
  }

  .comm-list-row {
    position: relative;
    transition: background .12s ease, box-shadow .12s ease, color .12s ease;
  }

  .comm-list-row:hover {
    background: rgba(191, 124, 22, .07);
  }

  .comm-list-row-selected {
    background: rgba(191, 124, 22, .14);
    box-shadow: inset 3px 0 0 var(--accent-d), inset 0 0 0 1px rgba(191, 124, 22, .22);
  }

  .comm-list-row-selected:hover {
    background: rgba(191, 124, 22, .18);
  }

  .comm-list-row-selected .comm-row-meta,
  .comm-list-row-selected .comm-row-time {
    color: var(--accent-d) !important;
  }

  .comm-list-row-selected .comm-row-subject {
    color: var(--ink) !important;
  }

  .comm-list-row-selected .comm-row-preview {
    color: var(--ink-soft) !important;
  }

  html[data-theme="dark"] .comm-filter-control:focus {
    box-shadow: inset 0 0 0 1px var(--accent-d), 0 0 0 2px rgba(245, 175, 74, .18);
  }

  html[data-theme="dark"] .comm-list-row:hover {
    background: rgba(245, 175, 74, .08);
  }

  html[data-theme="dark"] .comm-list-row-selected {
    background: rgba(245, 175, 74, .16);
    box-shadow: inset 3px 0 0 var(--accent-d), inset 0 0 0 1px rgba(245, 175, 74, .26);
  }

  html[data-theme="dark"] .comm-list-row-selected:hover {
    background: rgba(245, 175, 74, .2);
  }
</style>

<div x-data="commsInbox({{ exercise_id }})" class="workspace">

  <div class="page-head">
    <div>
      <h1 class="page-title">Communications</h1>
      <p class="text-[13.5px] text-muted mt-1">Messages that shape the exercise narrative.</p>
    </div>
    <div class="flex items-center gap-2">
      <span class="flex items-center gap-1.5 smallcaps"
            :class="wsConnected ? 'text-faint' : 'text-red-400'">
        <span x-text="wsConnected ? 'Live' : 'Disconnected'"></span>
      </span>
      <template x-if="!isF">
        <button @click="openSend()"
                class="btn btn-ghost h-8 px-3 text-[13px]">+ Send message</button>
      </template>
      <template x-if="isF">
        <button @click="openInjectInbound()"
                class="btn btn-ghost h-8 px-3 text-[13px]">Inject inbound</button>
      </template>
    </div>
  </div>

  <!-- Two-pane layout -->
  <div class="grid surface overflow-hidden"
       style="grid-template-columns: 340px 1fr; height: calc(100vh - 180px);">

    <!-- Message list -->
    <div class="border-r rule overflow-y-auto">
      <div class="px-4 pt-3 pb-2 flex items-center gap-2 border-b rule">
        <input x-model="commSearch"
               class="comm-filter-control flex-1 min-w-0"
               placeholder="Filter messages…" />
        <select x-model="directionFilter"
                aria-label="Filter by direction"
                class="comm-filter-control comm-direction-filter">
          <option value="all">All</option>
          <option value="inbound">Inbound</option>
          <option value="outbound">Outbound</option>
        </select>
        <span class="smallcaps text-faint" x-text="filteredComms.length"></span>
      </div>

      <div x-show="filteredComms.length === 0"
           class="px-4 py-8 text-center smallcaps text-faint">No messages.</div>

      <template x-for="c in filteredComms" :key="c.id">
        <div @click="open(c)"
             class="comm-list-row px-4 py-3 border-b rule cursor-pointer"
             :class="selected && selected.id === c.id ? 'comm-list-row-selected' : ''">
          <div class="flex items-center gap-2 mb-1">
            <span class="dot shrink-0"
                  :style="c.direction === 'inbound' ? 'background: var(--accent-d)' : 'background:#5b86b8'"></span>
            <span class="comm-row-meta smallcaps truncate"
                  :style="c.direction === 'inbound' ? 'color: var(--ink-soft)' : 'color: var(--muted)'"
                  x-text="commListMeta(c)"></span>
            <span class="comm-row-time mono text-[10.5px] text-faint ml-auto shrink-0"
                  style="color: var(--muted);"
                  x-text="fmtAgo(c.sent_at)"></span>
          </div>
          <div class="comm-row-subject text-[13.5px] truncate"
               :class="c.is_read ? 'font-normal' : 'font-medium'"
               :style="c.is_read ? 'color: var(--ink-soft)' : 'color: var(--ink)'"
               x-text="c.subject"></div>
          <div class="comm-row-preview text-[12px] truncate mt-0.5"
               style="color: var(--muted);"
               x-text="c.body"></div>
          <template x-if="c.triggered_by_inject_id">
            <div class="mono text-[10.5px] text-faint mt-1"
                 x-text="'triggered by inject #' + c.triggered_by_inject_id"></div>
          </template>
        </div>
      </template>
    </div>

    <!-- Reader pane -->
    <div class="overflow-y-auto p-8">
      <template x-if="!selected">
        <div class="flex items-center justify-center h-full">
          <p class="smallcaps text-faint">Select a message to read.</p>
        </div>
      </template>

      <template x-if="selected">
        <div>
          <div class="flex items-center gap-2 mb-4">
            <span class="pill"
                  :style="selected.direction === 'inbound'
                    ? 'background: oklch(0.74 0.14 70 / .15); color: var(--accent-d); box-shadow: inset 0 0 0 1px oklch(0.74 0.14 70 / .35);'
                    : 'background: #e6eef8; color: #2f5b8a; box-shadow: inset 0 0 0 1px #c5d7ec;'">
              <span class="dot"
                    :style="selected.direction === 'inbound' ? 'background: var(--accent-d)' : 'background:#5b86b8'"></span>
              <span x-text="commBadgeLabel(selected)"></span>
            </span>
            <span class="mono text-[11.5px] text-muted"
                  x-text="'MSG-' + selectedId + (selected.triggered_by_inject_id ? ' · triggered by inject #' + selected.triggered_by_inject_id : '')"></span>
            <span class="mono text-[11.5px] text-faint ml-auto" x-text="fmtTime(selected.sent_at)"></span>
          </div>

          <!-- Metadata -->
          <div class="space-y-2 text-[13px] mb-6">
            <div class="flex items-center gap-2 min-w-0">
              <div class="smallcaps text-muted shrink-0"
                   style="width: 42px;"
                   x-text="selected.direction === 'inbound' ? 'From' : 'To'"></div>
              <template x-if="selected.direction !== 'outbound' || !hasTeamRecipients(selected)">
                <div class="min-w-0" x-text="selected.external_entity || 'Internal'"></div>
              </template>
              <template x-if="selected.direction === 'outbound' && hasTeamRecipients(selected)">
                <div class="flex min-w-0 items-center gap-1 overflow-x-auto pb-0.5"
                     style="flex-wrap: nowrap;">
                  <template x-for="t in selected.visible_to_teams" :key="t">
                    <span class="pill mono ring-1 ring-inset text-[10px]"
                          style="white-space: nowrap;"
                          :class="teamColor(t)" x-text="teamDisplay(t)"></span>
                  </template>
                </div>
              </template>
            </div>
            <template x-if="selected.direction === 'outbound' && selected.sender_team">
              <div class="flex items-center gap-2 min-w-0">
                <div class="smallcaps text-muted shrink-0"
                     style="width: 42px;">From</div>
                <div class="min-w-0">
                  <span class="pill mono ring-1 ring-inset text-[10px]"
                        :class="teamColor(selected.sender_team)"
                        x-text="teamDisplay(selected.sender_team)"></span>
                </div>
              </div>
            </template>
            <template x-if="selected.direction === 'inbound' && hasTeamRecipients(selected)">
              <div class="flex items-center gap-2 min-w-0">
                <div class="smallcaps text-muted shrink-0"
                     style="width: 42px;">To</div>
                <div class="flex min-w-0 items-center gap-1 overflow-x-auto pb-0.5"
                     style="flex-wrap: nowrap;">
                  <template x-for="t in selected.visible_to_teams" :key="t">
                    <span class="pill mono ring-1 ring-inset text-[10px]"
                          style="white-space: nowrap;"
                          :class="teamColor(t)" x-text="teamDisplay(t)"></span>
                  </template>
                </div>
              </div>
            </template>
          </div>

          <div class="smallcaps text-muted mb-1">Subject</div>
          <h2 class="text-[20px] font-semibold tracking-tight mb-5" x-text="selected.subject"></h2>

          <article class="text-[14.5px] leading-relaxed text-ink whitespace-pre-wrap"
                   x-text="selected.body"></article>

          <!-- Participant reply (non-facilitators, inbound messages only) -->
          <template x-if="!isF && selected.direction === 'inbound'">
            <div class="mt-7 border-t rule pt-5">
              <div class="smallcaps text-muted mb-2">Send reply</div>
              <p class="text-[12.5px] text-muted mb-3">Send an outbound message in response.</p>
              <button @click="openSendReply(selected)"
                      class="btn btn-ghost h-8 px-3 text-[13px]">Reply to <span x-text="selected.external_entity || 'sender'"></span></button>
            </div>
          </template>

          <!-- Facilitator follow-up -->
          <template x-if="isF">
            <div class="mt-7 border-t rule pt-5">
              <div class="smallcaps text-muted mb-2">Inject follow-up</div>
              <p class="text-[12.5px] text-muted mb-3">Inject a new inbound message to participants.</p>
              <button @click="openInjectInbound(selected)"
                      class="btn btn-ghost h-8 px-3 text-[13px]">Inject inbound message</button>
            </div>
          </template>
        </div>
      </template>
    </div>
  </div>

  <!-- Participant send modal (inside x-data scope) -->
  <div x-show="showSend" x-cloak
       class="fixed inset-0 bg-black/40 flex items-center justify-center z-50"
       @keydown.escape.window="showSend = false; restoreDialogFocus()">
    <div x-ref="sendDialog" role="dialog" aria-modal="true" aria-labelledby="send-message-title"
         tabindex="-1" @keydown.tab="trapDialog($event, 'sendDialog')"
         class="paper ring-rule rounded-xl w-full max-w-lg p-6 shadow-xl" @click.stop>
      <h2 id="send-message-title" class="text-[18px] font-semibold mb-4">Send message</h2>
      <div class="space-y-3">
        <div>
          <label for="send-recipient" class="block smallcaps text-muted mb-1">To</label>
          <div class="flex gap-2 mb-2">
            <button type="button"
                    @click="send.recipient_type = 'external'"
                    class="btn h-7 px-3 text-[12px]"
                    :class="send.recipient_type === 'external' ? 'btn-primary' : 'btn-ghost'">
              External
            </button>
            <button type="button"
                    @click="send.recipient_type = 'team'"
                    class="btn h-7 px-3 text-[12px]"
                    :class="send.recipient_type === 'team' ? 'btn-primary' : 'btn-ghost'">
              Team
            </button>
          </div>
          <template x-if="send.recipient_type === 'external'">
            <input id="send-recipient" x-ref="sendRecipient" type="text" x-model="send.external_entity"
                   placeholder="e.g. ICO, NCSC, CEO, Press office"
                   class="w-full ring-rule rounded-md px-3 py-2 text-[13.5px] bg-surface" />
          </template>
          <template x-if="send.recipient_type === 'team'">
            <select x-model="send.recipient_team"
                    class="w-full ring-rule rounded-md px-3 py-2 text-[13.5px] bg-surface">
              <option value="">Select team…</option>
              <template x-for="team in teamOptions" :key="team.id">
                <option :value="team.id" x-text="team.label || team.id"></option>
              </template>
            </select>
          </template>
        </div>
        <div>
          <label for="send-subject" class="block smallcaps text-muted mb-1">Subject</label>
          <input id="send-subject" type="text" x-model="send.subject"
                 class="w-full ring-rule rounded-md px-3 py-2 text-[13.5px] bg-surface" />
        </div>
        <div>
          <label for="send-body" class="block smallcaps text-muted mb-1">Body</label>
          <textarea id="send-body" x-model="send.body" rows="5"
                    class="w-full ring-rule rounded-md px-3 py-2 text-[13.5px] resize-none bg-surface"></textarea>
        </div>
      </div>
      <div class="flex gap-3 mt-5">
        <button @click="sendComm()"
                class="btn btn-primary h-9 px-5 text-[13px]">Send</button>
        <button @click="showSend = false; restoreDialogFocus()"
                class="btn btn-ghost h-9 px-4 text-[13px]">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Facilitator inject modal (inside x-data scope) -->
  <div x-show="showCompose" x-cloak
       class="fixed inset-0 bg-black/40 flex items-center justify-center z-50"
       @keydown.escape.window="showCompose = false; restoreDialogFocus()">
    <div x-ref="composeDialog" role="dialog" aria-modal="true" aria-labelledby="inject-message-title"
         tabindex="-1" @keydown.tab="trapDialog($event, 'composeDialog')"
         class="paper ring-rule rounded-xl w-full max-w-lg p-6 shadow-xl" @click.stop>
      <h2 id="inject-message-title" class="text-[18px] font-semibold mb-4">Inject inbound message</h2>
      <div class="space-y-3">
        <div>
          <label for="compose-from" class="block smallcaps text-muted mb-1">From (external entity)</label>
          <input id="compose-from" x-ref="composeFrom" type="text" x-model="compose.external_entity" placeholder="e.g. ICO, NCSC, CEO"
                 class="w-full ring-rule rounded-md px-3 py-2 text-[13.5px] bg-surface" />
        </div>
        <div>
          <label for="compose-subject" class="block smallcaps text-muted mb-1">Subject</label>
          <input id="compose-subject" type="text" x-model="compose.subject"
                 class="w-full ring-rule rounded-md px-3 py-2 text-[13.5px] bg-surface" />
        </div>
        <div>
          <label for="compose-body" class="block smallcaps text-muted mb-1">Body</label>
          <textarea id="compose-body" x-model="compose.body" rows="4"
                    class="w-full ring-rule rounded-md px-3 py-2 text-[13.5px] resize-none bg-surface"></textarea>
        </div>
        <div>
          <div class="flex items-center justify-between mb-1">
            <label class="block smallcaps text-muted">To teams</label>
            <span class="smallcaps text-faint"
                  x-text="compose.visible_to_teams.length ? compose.visible_to_teams.length + ' selected' : 'All teams'"></span>
          </div>
          <div x-show="teamOptions.length"
               class="flex flex-wrap gap-2">
            <template x-for="team in teamOptions" :key="team.id">
              <label class="inline-flex items-center gap-2 rounded-md ring-rule px-2.5 py-1.5 text-[12.5px] cursor-pointer paper-soft"
                     :class="compose.visible_to_teams.includes(team.id) ? 'ring-line-strong bg-surface-2/70' : ''">
                <input type="checkbox"
                       :value="team.id"
                       x-model="compose.visible_to_teams"
                       class="accent-accent-ink" />
                <span x-text="teamLabel(team)"></span>
              </label>
            </template>
          </div>
          <div x-show="!teamOptions.length"
               class="rounded-md ring-rule px-3 py-2 text-[12.5px] text-muted bg-surface">
            All teams
          </div>
        </div>
      </div>
      <div class="flex gap-3 mt-5">
        <button @click="injectComm()"
                class="btn btn-primary h-9 px-5 text-[13px]">Send</button>
        <button @click="showCompose = false; restoreDialogFocus()"
                class="btn btn-ghost h-9 px-4 text-[13px]">Cancel</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}
