{% extends "base.html" %}
{% block title %}Scenarios — IcebergTTX{% endblock %}

{% block content %}
<style>
  .scenario-list-row {
    position: relative;
    transition: background .12s ease, box-shadow .12s ease;
  }

  .scenario-list-row:hover,
  .scenario-list-row:focus-within {
    background: rgba(191, 124, 22, .08);
    box-shadow: inset 3px 0 0 var(--accent-d), inset 0 0 0 1px rgba(191, 124, 22, .18);
  }

  .scenario-list-row:hover .scenario-row-title,
  .scenario-list-row:focus-within .scenario-row-title {
    color: var(--ink) !important;
  }

  .scenario-list-row:hover .scenario-row-meta,
  .scenario-list-row:focus-within .scenario-row-meta {
    color: var(--accent-d) !important;
  }

  html[data-theme="dark"] .scenario-list-row:hover,
  html[data-theme="dark"] .scenario-list-row:focus-within {
    background: rgba(245, 175, 74, .12);
    box-shadow: inset 3px 0 0 var(--accent-d), inset 0 0 0 1px rgba(245, 175, 74, .2);
  }
</style>

<div x-data="scenarioList()" class="workspace">

  <div class="page-head">
    <div>
      <h1 class="page-title">Scenarios</h1>
      <p class="text-[13.5px] text-muted mt-1">Reusable exercise scripts and branching inject trees.</p>
    </div>
    <div class="flex items-center gap-2" x-show="isF">
      <template x-if="isF">
        <label class="btn btn-ghost h-8 px-3 text-[13px] cursor-pointer">
          Import JSON
          <input type="file" accept=".json" class="hidden" @change="importFile($event)" />
        </label>
      </template>
      <a href="/scenarios/new" class="btn btn-primary h-8 px-3 text-[13px]">+ New scenario</a>
    </div>
  </div>

  <template x-if="importError">
    <div class="mb-4 rounded-md px-4 py-3 text-[13px]" style="background:#fee2e2; color:#b91c1c;"
         x-text="importError"></div>
  </template>
  <template x-if="importSuccess">
    <div class="mb-4 rounded-md px-4 py-3 text-[13px]" style="background:#dcfce7; color:#166534;"
         x-text="importSuccess"></div>
  </template>

  <div x-show="loading" class="smallcaps text-faint py-8 text-center">Loading…</div>

  <div x-show="!loading" class="surface overflow-x-auto">
    <!-- Table header -->
    <div class="grid gap-x-4 px-5 py-2.5 border-b rule"
         style="grid-template-columns: minmax(260px, 1fr) minmax(120px, 160px) 112px 88px 184px; min-width: 824px;">
      <div class="smallcaps text-muted">Scenario</div>
      <div class="smallcaps text-muted">Tags</div>
      <div class="smallcaps text-muted text-right">Injects / branches</div>
      <div class="smallcaps text-muted text-right">Updated</div>
      <div class="smallcaps text-muted text-right">Actions</div>
    </div>

    <template x-if="!loading && scenarios.length === 0">
      <div class="px-5 py-10 text-center smallcaps text-faint">
        No scenarios yet. <a href="/scenarios/new" class="underline hover:text-ink-soft">Create one.</a>
      </div>
    </template>

    <template x-for="s in scenarios" :key="s.id">
      <div class="scenario-list-row grid gap-x-4 px-5 py-3.5 items-center border-b rule"
           style="grid-template-columns: minmax(260px, 1fr) minmax(120px, 160px) 112px 88px 184px; min-width: 824px;">

        <!-- Scenario name + ID -->
        <div>
          <a :href="'/scenarios/' + s.id"
             class="scenario-row-title text-[14px] font-medium hover:text-ink" x-text="s.title"></a>
          <div class="scenario-row-meta mono text-[11px] text-faint mt-0.5"
               x-text="'SC-' + padId(s.id, 3)"></div>
        </div>

        <!-- Tags -->
        <div class="flex flex-wrap gap-1">
          <template x-for="tag in (s.tags || [])" :key="tag">
            <span class="pill text-[10px] bg-surface-2 text-ink-soft" x-text="tag"></span>
          </template>
          <span x-show="!s.tags || s.tags.length === 0" class="text-faint text-[12px]">—</span>
        </div>

        <!-- Injects / branches -->
        <div class="scenario-row-meta mono text-[12.5px] text-ink-soft text-right"
             x-text="(s.inject_count || 0) + ' / ' + (s.branch_count || 0)"></div>

        <!-- Updated -->
        <div class="scenario-row-meta mono text-[12px] text-muted text-right" x-text="fmtAgo(s.updated_at)"></div>

        <!-- Actions -->
        <div class="flex items-center justify-end gap-x-4 whitespace-nowrap" x-show="isF">
          <a :href="'/scenarios/' + s.id + '/edit'"
             class="smallcaps text-faint hover:text-ink-soft">Edit</a>
          <a :href="'/api/scenarios/' + s.id + '/export'" target="_blank"
             class="smallcaps text-faint hover:text-ink-soft">Export</a>
          <button @click="deleteScenario(s.id)"
                  class="smallcaps text-red-400 hover:text-red-600">Delete</button>
        </div>
        <div x-show="!isF"></div>
      </div>
    </template>
  </div>

</div>
{% endblock %}
