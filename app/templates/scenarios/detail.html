{% extends "base.html" %}
{% block title %}Scenario — IcebergTTX{% endblock %}

{% block content %}
<div x-data="scenarioDetail({{ scenario_id }})" class="workspace">

  <div x-show="loading" class="smallcaps text-faint py-8 text-center">Loading…</div>

  <template x-if="!loading && scenario">
    <div class="grid gap-7" style="grid-template-columns: 1fr 280px;">

      <!-- Main column -->
      <div>
        <!-- Header -->
        <div class="flex items-start justify-between mb-6">
          <div>
            <div class="smallcaps text-muted mb-1"
                 x-text="'SC-' + padId(scenario.id, 3)"></div>
            <h1 class="text-[26px] font-semibold tracking-tight" x-text="scenario.title"></h1>
            <p class="text-muted text-[14px] mt-1" x-text="scenario.description || ''"></p>
            <div class="flex flex-wrap gap-1 mt-2">
              <template x-for="tag in (scenario.tags || [])" :key="tag">
                <span class="pill text-[10px] bg-surface-2 text-ink-soft" x-text="tag"></span>
              </template>
            </div>
          </div>
          <div class="flex gap-2 shrink-0" x-show="isF">
            <a :href="'/scenarios/' + scenario.id + '/edit'"
               class="btn btn-ghost h-8 px-3 text-[13px]">Edit</a>
            <a :href="'/api/scenarios/' + scenario.id + '/export'" target="_blank"
               class="btn btn-ghost h-8 px-3 text-[13px]">Export JSON</a>
          </div>
        </div>

        <!-- Inject tree -->
        <div class="section-title mb-4">
          <h2 class="smallcaps text-muted">Inject tree</h2>
        </div>

        <div class="space-y-1.5">
          <template x-for="row in treeRows" :key="row.node.id + '-' + row.depth">
            <div :style="'padding-left: ' + (row.depth * 22) + 'px'">
              <div class="node">
                <div class="flex items-center gap-2 mb-1">
                  <span class="mono text-[11px] text-faint" x-text="row.node.id"></span>
                  <template x-if="row.node.id === scenario.definition.start_inject_id">
                    <span class="pill text-[10px]" style="background:#dcfce7; color:#166534; box-shadow: inset 0 0 0 1px #bbf7d0;">start</span>
                  </template>
                  <template x-if="row.node.options && row.node.options.length > 1">
                    <span class="pill text-[10px]"
                          style="background: oklch(0.74 0.14 70 / .12); color: var(--accent-d); box-shadow: inset 0 0 0 1px oklch(0.74 0.14 70 / .3);">branch</span>
                  </template>
                  <template x-if="(!row.node.options || row.node.options.length === 0) && row.node.next_inject_id">
                    <span class="pill text-[10px]"
                          style="background:#dcfce7; color:#166534; box-shadow: inset 0 0 0 1px #bbf7d0;">linear</span>
                  </template>
                  <template x-if="(!row.node.options || row.node.options.length === 0) && !row.node.next_inject_id">
                    <span class="pill text-[10px]" style="background:#e6eef8; color:#2f5b8a; box-shadow: inset 0 0 0 1px #c5d7ec;">end</span>
                  </template>
                  <!-- Team pills -->
                  <div class="flex flex-wrap gap-1 ml-auto">
                    <template x-for="t in (row.node.target_teams || [])" :key="t">
                      <span class="pill mono text-[10px]" :class="teamColor(t)" x-text="t"></span>
                    </template>
                  </div>
                </div>
                <div class="text-[13.5px] font-medium" x-text="row.node.title"></div>
                <p class="text-[12.5px] text-muted mt-0.5 line-clamp-2" x-text="row.node.content"></p>

                <!-- Options -->
                <template x-if="row.node.options && row.node.options.length">
                  <div class="mt-2 space-y-1">
                    <template x-for="opt in row.node.options" :key="opt.id">
                      <div class="flex items-center gap-2 text-[12px] text-muted">
                        <span class="text-faint mono">→</span>
                        <span x-text="opt.label"></span>
                        <span class="mono text-[10.5px] text-faint ml-auto"
                              x-text="opt.next_inject_id ? opt.next_inject_id : '(end)'"></span>
                      </div>
                    </template>
                  </div>
                </template>

                <template x-if="(!row.node.options || row.node.options.length === 0) && row.node.next_inject_id">
                  <div class="mt-2 flex items-center gap-2 text-[12px] text-muted">
                    <span class="text-faint mono">→</span>
                    <span>Linear next</span>
                    <span class="mono text-[10.5px] text-faint ml-auto"
                          x-text="row.node.next_inject_id"></span>
                  </div>
                </template>

                <!-- Expected actions -->
                <template x-if="row.node.expected_actions && row.node.expected_actions.length">
                  <div class="mt-2 pt-2 border-t rule">
                    <div class="smallcaps text-faint mb-1">Expected actions</div>
                    <ul class="space-y-0.5">
                      <template x-for="act in row.node.expected_actions" :key="act">
                        <li class="flex items-start gap-1.5 text-[12px] text-ink-soft">
                          <span class="dot mt-1 shrink-0" style="background: var(--accent-d);"></span>
                          <span x-text="act"></span>
                        </li>
                      </template>
                    </ul>
                  </div>
                </template>
              </div>
            </div>
          </template>

          <div x-show="treeRows.length === 0"
               class="smallcaps text-faint text-center py-8">
            No injects defined.
          </div>
        </div>
      </div>

      <!-- Sidebar -->
      <div class="space-y-5">

        <!-- Stats -->
        <div class="paper ring-rule rounded-lg p-4 space-y-3">
          <div class="smallcaps text-muted mb-2">Summary</div>
          <div class="flex justify-between text-[13px]">
            <span class="text-muted">Injects</span>
            <span class="mono font-medium" x-text="injectCount"></span>
          </div>
          <div class="flex justify-between text-[13px]">
            <span class="text-muted">Branch points</span>
            <span class="mono font-medium" x-text="branchCount"></span>
          </div>
          <div class="flex justify-between text-[13px]">
            <span class="text-muted">Linear steps</span>
            <span class="mono font-medium" x-text="linearCount"></span>
          </div>
          <div class="flex justify-between text-[13px]">
            <span class="text-muted">End nodes</span>
            <span class="mono font-medium" x-text="endCount"></span>
          </div>
        </div>

        <!-- Teams involved -->
        <div class="paper ring-rule rounded-lg p-4">
          <div class="smallcaps text-muted mb-3">Teams involved</div>
          <div class="flex flex-wrap gap-1.5">
            <template x-for="t in teamsInvolved" :key="t">
              <span class="pill mono text-[10.5px]" :class="teamColor(t)" x-text="t"></span>
            </template>
            <span x-show="teamsInvolved.length === 0" class="text-[12.5px] text-faint">None specified</span>
          </div>
        </div>

        <!-- Validation -->
        <div class="paper ring-rule rounded-lg p-4">
          <div class="smallcaps text-muted mb-3">Validation</div>
          <template x-if="validationIssues.length === 0">
            <div class="flex items-center gap-2 text-[13px]" style="color:#166534;">
              <span class="dot" style="background:#22c55e;"></span>
              No issues found
            </div>
          </template>
          <template x-if="validationIssues.length > 0">
            <div class="space-y-2">
              <template x-for="issue in validationIssues" :key="issue">
                <div class="flex items-start gap-2 text-[12.5px]" style="color:#b91c1c;">
                  <span class="dot shrink-0 mt-1" style="background:#ef4444;"></span>
                  <span x-text="issue"></span>
                </div>
              </template>
            </div>
          </template>
        </div>

      </div>
    </div>
  </template>

  <template x-if="!loading && !scenario">
    <p class="text-[13.5px]" style="color:#b91c1c;">Scenario not found.</p>
  </template>
</div>
{% endblock %}
