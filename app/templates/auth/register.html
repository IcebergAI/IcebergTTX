{% extends "base.html" %}
{% block title %}Register — IcebergTTX{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center" style="background: var(--bg);">
  <div x-data="registerForm()" class="paper ring-rule rounded-xl p-8 w-full max-w-sm shadow-sm">

    <div class="flex items-center gap-2.5 mb-7">
      <img src="/static/img/icebergai-mark.svg" class="h-8 w-8 rounded-md" width="32" height="32" alt="Iceberg" />
      <div>
        <div class="text-[15px] font-semibold leading-tight" style="color: var(--ink);">IcebergTTX</div>
        <div class="smallcaps text-muted leading-tight">TTX control</div>
      </div>
    </div>

    <h1 class="text-[20px] font-semibold tracking-tight mb-5">Create account</h1>

    <div x-show="error"
         class="mb-4 rounded-md px-3 py-2.5 text-[13px]"
         style="background:#fee2e2; color:#b91c1c;"
         x-text="error"></div>

    <form @submit.prevent="submit()" class="space-y-3.5">
      <div>
        <label class="block smallcaps text-muted mb-1">Email</label>
        <input type="email" x-model="email" required autocomplete="email"
               class="w-full ring-rule rounded-md px-3 py-2 text-[13.5px] bg-surface outline-none focus:ring-2 focus:ring-line-strong" />
      </div>
      <div>
        <label class="block smallcaps text-muted mb-1">Display name</label>
        <input type="text" x-model="display_name" required autocomplete="name"
               class="w-full ring-rule rounded-md px-3 py-2 text-[13.5px] bg-surface outline-none focus:ring-2 focus:ring-line-strong" />
      </div>
      <div>
        <label class="block smallcaps text-muted mb-1">Password</label>
        <input type="password" x-model="password" required autocomplete="new-password"
               class="w-full ring-rule rounded-md px-3 py-2 text-[13.5px] bg-surface outline-none focus:ring-2 focus:ring-line-strong" />
      </div>
      <div>
        <label class="block smallcaps text-muted mb-1">
          Team / department
          <span class="text-faint normal-case font-normal">(optional)</span>
        </label>
        <input type="text" x-model="team" placeholder="e.g. IT Operations"
               class="w-full ring-rule rounded-md px-3 py-2 text-[13.5px] bg-surface outline-none focus:ring-2 focus:ring-line-strong" />
      </div>
      <button type="submit" :disabled="loading"
              class="btn btn-primary w-full h-9 text-[13.5px] justify-center disabled:opacity-50 mt-1">
        <span x-text="loading ? 'Creating account…' : 'Create account'"></span>
      </button>
    </form>

    <p class="mt-5 text-[13px] text-center text-muted">
      Already have an account?
      <a href="/login" class="text-ink-soft font-medium hover:underline">Sign in</a>
    </p>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script>
function registerForm() {
  return {
    email: '', display_name: '', password: '', team: '',
    loading: false, error: '',
    async submit() {
      this.loading = true; this.error = '';
      const body = { email: this.email, display_name: this.display_name, password: this.password };
      if (this.team) body.team = this.team;
      const resp = await fetch('/api/auth/register', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify(body),
      });
      this.loading = false;
      if (resp.ok) {
        window.location.href = '/login';
      } else {
        const data = await resp.json();
        this.error = formatApiError(data.detail) || 'Registration failed.';
      }
    }
  }
}

function formatApiError(detail) {
  if (typeof detail === 'string') return detail;
  if (Array.isArray(detail)) {
    return detail.map((item) => {
      if (typeof item === 'string') return item;
      const field = Array.isArray(item.loc) ? item.loc[item.loc.length - 1] : null;
      return field ? `${field}: ${item.msg}` : item.msg;
    }).filter(Boolean).join(' ');
  }
  if (detail && typeof detail === 'object') return detail.msg || JSON.stringify(detail);
  return '';
}
</script>
{% endblock %}
