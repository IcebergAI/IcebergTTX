{% extends "base.html" %}
{% block title %}Forgot password — IcebergTTX{% endblock %}

{% block content %}
<div class="min-h-screen flex items-center justify-center" style="background: var(--bg);">
  <div x-data="forgotPasswordForm()" class="paper ring-rule rounded-xl p-8 w-full max-w-sm shadow-sm">

    <div class="flex items-center gap-2.5 mb-7">
      <img src="/static/img/icebergai-mark.svg" class="h-8 w-8 rounded-md" width="32" height="32" alt="Iceberg" />
      <div>
        <div class="text-[15px] font-semibold leading-tight" style="color: var(--ink);">IcebergTTX</div>
        <div class="smallcaps text-muted leading-tight">TTX control</div>
      </div>
    </div>

    <h1 class="text-[20px] font-semibold tracking-tight mb-2">Reset password</h1>
    <p class="text-[13px] text-muted mb-5">Enter your email and we'll send a reset link if an account exists.</p>

    <div x-show="sent"
         class="mb-4 rounded-md px-3 py-2.5 text-[13px]"
         style="background:#dcfce7; color:#166534;"
         x-text="'If an account exists for that email, a reset link is on its way. Check your inbox.'"></div>

    <form x-show="!sent" @submit.prevent="submit()" class="space-y-3.5">
      <div>
        <label class="block smallcaps text-muted mb-1">Email</label>
        <input type="email" x-model="email" required autocomplete="email"
               class="w-full ring-rule rounded-md px-3 py-2 text-[13.5px] bg-surface outline-none focus:ring-2 focus:ring-line-strong" />
      </div>
      <button type="submit" :disabled="loading"
              class="btn btn-primary w-full h-9 text-[13.5px] justify-center disabled:opacity-50 mt-1">
        <span x-text="loading ? 'Sending…' : 'Send reset link'"></span>
      </button>
    </form>

    <p class="mt-5 text-[13px] text-center text-muted">
      <a href="/login" class="text-ink-soft font-medium hover:underline">Back to sign in</a>
    </p>
  </div>
</div>
{% endblock %}
