{% extends "base.html" %}
{% block title %}Exercise — IcebergTTX{% endblock %}

{% block content %}
<div x-data="participantView({{ exercise_id }})">
  <div x-show="loading" class="flex items-center justify-center py-16">
    <span class="smallcaps text-faint">Loading…</span>
  </div>

  <template x-if="!loading && exercise">
    <div class="max-w-[720px] mx-auto px-8 py-8">

      <!-- Header -->
      <div class="flex items-center gap-3 mb-1">
        <template x-if="exercise.state === 'active'">
          <span class="pill bg-st-active"><span class="live-dot"></span>Live</span>
        </template>
        <template x-if="exercise.state === 'paused'">
          <span class="pill bg-st-paused"><span class="dot" style="background:#c08a26"></span>Paused</span>
        </template>
        <template x-if="exercise.state === 'draft'">
          <span class="pill bg-st-draft"><span class="dot" style="background:#9a958a"></span>Draft</span>
        </template>
        <template x-if="exercise.state === 'completed'">
          <span class="pill bg-st-completed"><span class="dot" style="background:#5b86b8"></span>Completed</span>
        </template>

        <span class="mono text-[11.5px] text-muted">EX-<span x-text="exId"></span></span>

        <template x-if="isObserver">
          <span class="pill bg-surface-2 text-muted">Observer — read only</span>
        </template>

        <div class="ml-auto flex items-center gap-3">
          <span x-show="exercise.state !== 'draft'" class="mono text-[12px] text-muted"
                :title="exercise.state === 'paused' ? 'Elapsed (paused)' : 'Elapsed exercise time'"
                x-text="elapsedStr"></span>
          <a :href="'/exercises/' + exercise.id + '/communications'"
             class="text-[12.5px] text-muted hover:text-ink">Communications</a>
          <span class="flex items-center gap-1.5 smallcaps"
                :class="wsConnected ? 'text-faint' : 'text-red-400'">
            <span x-show="!wsAccessDenied" x-text="wsConnected ? 'Connected' : 'Disconnected'"></span>
            <span x-show="wsAccessDenied">Access denied</span>
          </span>
        </div>
      </div>

      <h1 class="text-[24px] font-semibold tracking-tight" x-text="exercise.title"></h1>
      <p class="text-muted text-[14px] mt-1">Respond to each released brief when your team is ready.</p>

      <!-- State banners -->
      <div x-show="exercise.state === 'draft'"
           class="mt-5 rounded-lg p-4 text-[13.5px]" style="background:#fef4e0; color:#8a5a0d;">
        This exercise hasn't started yet. Wait for the facilitator to begin.
      </div>
      <div x-show="exercise.state === 'completed'"
           class="mt-5 rounded-lg p-4 text-[13.5px]" style="background:#e6eef8; color:#2f5b8a;">
        This exercise has concluded. Thank you for participating.
      </div>
      <div x-show="exercise.state === 'paused'"
           class="mt-5 rounded-lg p-4 text-[13.5px]" style="background:#fef4e0; color:#8a5a0d;">
        Exercise is paused. Responses are disabled until the facilitator resumes.
      </div>

      <!-- Inject feed -->
      <div x-show="exercise.state === 'active' || exercise.state === 'paused'"
           class="mt-7 space-y-5">

        <!-- Inject cards — release order, with the earliest unanswered brief active -->
        <template x-for="(inj, idx) in injects" :key="inj.id">
          <article class="briefing" :class="isCurrentBrief(inj) ? 'released' : ''">
            <div class="p-5">
              <div class="flex items-center gap-2 mb-1.5">
                <span class="smallcaps"
                      :class="isCurrentBrief(inj) ? '' : 'text-muted'"
                      :style="isCurrentBrief(inj) ? 'color: var(--accent-d);' : ''"
                      x-text="briefLabel(inj)"></span>
                <span class="mono text-[11px] text-faint"
                      x-text="(inj.scenario_node_id || '') + ' · ' + fmtTime(inj.released_at)"></span>
              </div>

              <h2 class="font-semibold tracking-tight"
                  :class="isCurrentBrief(inj) ? 'text-[18px] mt-1' : 'text-[16px]'"
                  x-text="inj.title"></h2>
              <p class="text-ink mt-2 leading-relaxed"
                 :class="isCurrentBrief(inj) ? 'text-[14.5px]' : 'text-[13.5px] text-ink-soft'"
                 x-text="inj.content"></p>
              <template x-if="inj.attachment">
                <a :href="inj.attachment.url"
                   download
                   class="mt-3 inline-flex items-center gap-2 rounded-md ring-rule px-2.5 py-1.5 text-[12.5px] text-ink-soft hover:text-ink paper-soft"
                   style="max-width: 100%;">
                  <span class="mono text-faint">↓</span>
                  <span class="truncate" x-text="inj.attachment.filename"></span>
                </a>
              </template>

              <!-- Submitted confirmation for resolved injects -->
              <template x-if="!isCurrentBrief(inj) && submitted[inj.id]">
                <div class="mt-3 flex items-center gap-2 text-[12.5px] text-muted">
                  <span class="dot" style="background:#3b8e5a"></span>
                  You submitted a response
                </div>
              </template>

              <!-- Observer read-only notice -->
              <template x-if="isObserver && isCurrentBrief(inj)">
                <p class="mt-3 text-[13px] text-faint italic">Viewing as observer — responses disabled.</p>
              </template>

              <!-- Response form for active inject, non-observer, not yet submitted -->
              <template x-if="!isObserver && isCurrentBrief(inj) && inj.state === 'released' && !submitted[inj.id]">
                <div class="mt-5 rounded-md p-4 ring-rule paper-soft">

                  <!-- Branch options -->
                  <template x-if="hasOptions(inj)">
                    <div class="mb-4">
                      <div class="smallcaps text-muted mb-2">Decision</div>
                      <div class="space-y-1.5">
                        <template x-for="opt in inj._options" :key="opt.id">
                          <label class="flex items-center gap-2.5 text-[13.5px] cursor-pointer">
                            <input type="radio" :name="'opt_' + inj.id" :value="opt.id"
                                   x-model="selectedOption[inj.id]"
                                   :disabled="exercise.state === 'paused'"
                                   class="accent-accent-ink" />
                            <span x-text="opt.label"></span>
                          </label>
                        </template>
                      </div>
                    </div>
                  </template>

                  <template x-if="requiresFreeText(inj)">
                    <div>
                      <div class="smallcaps text-muted mb-1.5"
                           x-text="hasOptions(inj) ? 'Reasoning' : 'Response'"></div>
                      <textarea :id="'resp_' + inj.id" x-model="freeText[inj.id]"
                                placeholder="What will your team do next?"
                                rows="4"
                                :disabled="exercise.state === 'paused'"
                                class="w-full rounded-md ring-rule px-3 py-2 text-[13.5px] resize-none bg-surface disabled:opacity-50"></textarea>
                    </div>
                  </template>

                  <p x-show="hasOptions(inj) && !requiresFreeText(inj)"
                     class="text-[12.5px] text-muted">
                    Choose one decision. No written response is required.
                  </p>

                  <div class="flex items-center gap-3 mt-3">
                    <button @click="submitResponse(inj)"
                            :disabled="!canSubmit(inj)"
                            class="btn btn-primary h-8 px-3.5 text-[13px] disabled:opacity-40">
                      <span x-text="submitting[inj.id] ? 'Submitting…' : 'Submit response'"></span>
                    </button>
                  </div>
                  <p x-show="responseValidationMessage(inj) && !responseErrors[inj.id]"
                     class="mt-2 text-[12.5px] text-muted"
                     x-text="responseValidationMessage(inj)"></p>
                  <p x-show="responseErrors[inj.id]"
                     aria-live="polite"
                     class="mt-2 text-[12.5px] text-red-400"
                     x-text="responseErrors[inj.id]"></p>
                </div>
              </template>

              <!-- Submitted confirmation for active inject -->
              <template x-if="!isObserver && isCurrentBrief(inj) && submitted[inj.id]">
                <div class="mt-4 flex items-center gap-2 text-[13px]" style="color:#3b8e5a;">
                  <span class="dot" style="background:#3b8e5a"></span>
                  Response submitted.
                </div>
              </template>

              <!-- Team comments -->
              <div x-show="isCurrentBrief(inj) || commentsFor(inj.id).length"
                   class="mt-4 pt-4 border-t rule">
                <div class="flex items-center gap-2 mb-2">
                  <span class="smallcaps text-muted">Team comments</span>
                  <span class="mono text-[11px] text-faint"
                        x-text="commentsFor(inj.id).length"></span>
                </div>
                <div x-show="commentsFor(inj.id).length"
                     class="space-y-2 mb-3">
                  <template x-for="comment in commentsFor(inj.id)" :key="comment.id">
                    <div class="rounded-md ring-rule paper-soft px-3 py-2">
                      <div class="flex items-center gap-2 mb-1">
                        <span class="text-[12.5px] font-medium"
                              x-text="comment.author_name || ('User #' + comment.user_id)"></span>
                        <span class="mono text-[10.5px] text-faint"
                              x-text="fmtAgo(comment.created_at)"></span>
                      </div>
                      <p class="text-[13px] text-ink-soft whitespace-pre-wrap"
                         x-text="comment.content"></p>
                    </div>
                  </template>
                </div>
                <template x-if="!isObserver && inj.state === 'released' && exercise.state === 'active'">
                  <div>
                    <textarea x-model="commentDraft[inj.id]"
                              placeholder="Add a team comment…"
                              rows="2"
                              class="w-full rounded-md ring-rule px-3 py-2 text-[13px] resize-none bg-surface"></textarea>
                    <div class="flex items-center gap-3 mt-2">
                      <button @click="submitComment(inj)"
                              :disabled="!canComment(inj)"
                              class="btn btn-ghost h-7 px-3 text-[12px] disabled:opacity-40">
                        <span x-text="commentSubmitting[inj.id] ? 'Posting…' : 'Post comment'"></span>
                      </button>
                      <p x-show="commentErrors[inj.id]"
                         class="text-[12px] text-red-400"
                         x-text="commentErrors[inj.id]"></p>
                    </div>
                  </div>
                </template>
              </div>
            </div>
          </article>
        </template>

        <!-- Waiting placeholder -->
        <div x-show="injects.length === 0"
             class="rounded-md py-6 text-center smallcaps text-faint ring-rule"
             style="background: var(--paper);">
          Waiting for the facilitator…
        </div>
        <div x-show="injects.length > 0 && !currentBriefId"
             class="rounded-md py-6 text-center smallcaps text-faint ring-rule"
             style="background: var(--paper);">
          All released briefs have responses.
        </div>
      </div>

    </div>
  </template>
</div>
{% endblock %}
