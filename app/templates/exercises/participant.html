{% extends "base.html" %}
{% block title %}Exercise — IcebergTTX{% endblock %}

{% block content %}
<div x-data="participantView({{ exercise_id }})" x-init="init()">
  <div x-show="loading" class="flex items-center justify-center py-16">
    <span class="smallcaps text-faint">Loading…</span>
  </div>

  <template x-if="!loading && exercise">
    <div class="max-w-[720px] mx-auto px-8 py-8">

      <!-- Header -->
      <div class="flex items-center gap-3 mb-1">
        <template x-if="exercise.state === 'active'">
          <span class="pill bg-st-active"><span class="live-dot"></span>Live</span>
        </template>
        <template x-if="exercise.state === 'paused'">
          <span class="pill bg-st-paused"><span class="dot" style="background:#c08a26"></span>Paused</span>
        </template>
        <template x-if="exercise.state === 'draft'">
          <span class="pill bg-st-draft"><span class="dot" style="background:#9a958a"></span>Draft</span>
        </template>
        <template x-if="exercise.state === 'completed'">
          <span class="pill bg-st-completed"><span class="dot" style="background:#5b86b8"></span>Completed</span>
        </template>

        <span class="mono text-[11.5px] text-muted">EX-<span x-text="String(exercise.id).padStart(3,'0')"></span></span>

        <template x-if="isObserver">
          <span class="pill bg-surface-2 text-muted">Observer — read only</span>
        </template>

        <div class="ml-auto flex items-center gap-3">
          <a :href="'/exercises/' + exercise.id + '/communications'"
             class="text-[12.5px] text-muted hover:text-ink">Communications</a>
          <span class="flex items-center gap-1.5 smallcaps"
                :class="wsConnected ? 'text-faint' : 'text-red-400'">
            <span x-text="wsConnected ? 'Connected' : 'Disconnected'"></span>
          </span>
        </div>
      </div>

      <h1 class="text-[24px] font-semibold tracking-tight" x-text="exercise.title"></h1>
      <p class="text-muted text-[14px] mt-1">Respond to each released brief when your team is ready.</p>

      <!-- State banners -->
      <div x-show="exercise.state === 'draft'"
           class="mt-5 rounded-lg p-4 text-[13.5px]" style="background:#fef4e0; color:#8a5a0d;">
        This exercise hasn't started yet. Wait for the facilitator to begin.
      </div>
      <div x-show="exercise.state === 'completed'"
           class="mt-5 rounded-lg p-4 text-[13.5px]" style="background:#e6eef8; color:#2f5b8a;">
        This exercise has concluded. Thank you for participating.
      </div>
      <div x-show="exercise.state === 'paused'"
           class="mt-5 rounded-lg p-4 text-[13.5px]" style="background:#fef4e0; color:#8a5a0d;">
        Exercise is paused. Responses are disabled until the facilitator resumes.
      </div>

      <!-- Inject feed -->
      <div x-show="exercise.state === 'active' || exercise.state === 'paused'"
           class="mt-7 space-y-5">

        <!-- Inject cards — release order, with the earliest unanswered brief active -->
        <template x-for="(inj, idx) in injects" :key="inj.id">
          <article class="briefing" :class="isCurrentBrief(inj) ? 'released' : ''">
            <div class="p-5">
              <div class="flex items-center gap-2 mb-1.5">
                <span class="smallcaps"
                      :class="isCurrentBrief(inj) ? '' : 'text-muted'"
                      :style="isCurrentBrief(inj) ? 'color: var(--accent-d);' : ''"
                      x-text="briefLabel(inj)"></span>
                <span class="mono text-[11px] text-faint"
                      x-text="(inj.scenario_node_id || '') + ' · ' + fmtTime(inj.released_at)"></span>
              </div>

              <h2 class="font-semibold tracking-tight"
                  :class="isCurrentBrief(inj) ? 'text-[18px] mt-1' : 'text-[16px]'"
                  x-text="inj.title"></h2>
              <p class="text-ink mt-2 leading-relaxed"
                 :class="isCurrentBrief(inj) ? 'text-[14.5px]' : 'text-[13.5px] text-ink-soft'"
                 x-text="inj.content"></p>
              <template x-if="inj.attachment">
                <a :href="inj.attachment.url"
                   download
                   class="mt-3 inline-flex items-center gap-2 rounded-md ring-rule px-2.5 py-1.5 text-[12.5px] text-ink-soft hover:text-ink paper-soft"
                   style="max-width: 100%;">
                  <span class="mono text-faint">↓</span>
                  <span class="truncate" x-text="inj.attachment.filename"></span>
                </a>
              </template>

              <!-- Submitted confirmation for resolved injects -->
              <template x-if="!isCurrentBrief(inj) && submitted[inj.id]">
                <div class="mt-3 flex items-center gap-2 text-[12.5px] text-muted">
                  <span class="dot" style="background:#3b8e5a"></span>
                  You submitted a response
                </div>
              </template>

              <!-- Observer read-only notice -->
              <template x-if="isObserver && isCurrentBrief(inj)">
                <p class="mt-3 text-[13px] text-faint italic">Viewing as observer — responses disabled.</p>
              </template>

              <!-- Response form for active inject, non-observer, not yet submitted -->
              <template x-if="!isObserver && isCurrentBrief(inj) && inj.state === 'released' && !submitted[inj.id]">
                <div class="mt-5 rounded-md p-4 ring-rule paper-soft">

                  <!-- Branch options -->
                  <template x-if="inj._options && inj._options.length">
                    <div class="mb-4">
                      <div class="smallcaps text-muted mb-2">Decision</div>
                      <div class="space-y-1.5">
                        <template x-for="opt in inj._options" :key="opt.id">
                          <label class="flex items-center gap-2.5 text-[13.5px] cursor-pointer">
                            <input type="radio" :name="'opt_' + inj.id" :value="opt.id"
                                   x-model="selectedOption[inj.id]"
                                   :disabled="exercise.state === 'paused'"
                                   class="accent-accent-ink" />
                            <span x-text="opt.label"></span>
                          </label>
                        </template>
                      </div>
                    </div>
                  </template>

                  <div class="smallcaps text-muted mb-1.5"
                       x-text="inj._options && inj._options.length ? 'Reasoning' : 'Response'"></div>
                  <textarea :id="'resp_' + inj.id" x-model="freeText[inj.id]"
                            placeholder="What will your team do next?"
                            rows="4"
                            :disabled="exercise.state === 'paused'"
                            class="w-full rounded-md ring-rule px-3 py-2 text-[13.5px] resize-none bg-surface disabled:opacity-50"></textarea>

                  <div class="flex items-center gap-3 mt-3">
                    <button @click="submitResponse(inj)"
                            :disabled="!canSubmit(inj)"
                            class="btn btn-primary h-8 px-3.5 text-[13px] disabled:opacity-40">
                      <span x-text="submitting[inj.id] ? 'Submitting…' : 'Submit response'"></span>
                    </button>
                  </div>
                  <p x-show="responseErrors[inj.id]"
                     class="mt-2 text-[12.5px] text-red-400"
                     x-text="responseErrors[inj.id]"></p>
                </div>
              </template>

              <!-- Submitted confirmation for active inject -->
              <template x-if="!isObserver && isCurrentBrief(inj) && submitted[inj.id]">
                <div class="mt-4 flex items-center gap-2 text-[13px]" style="color:#3b8e5a;">
                  <span class="dot" style="background:#3b8e5a"></span>
                  Response submitted.
                </div>
              </template>

              <!-- Team comments -->
              <div x-show="isCurrentBrief(inj) || commentsFor(inj.id).length"
                   class="mt-4 pt-4 border-t rule">
                <div class="flex items-center gap-2 mb-2">
                  <span class="smallcaps text-muted">Team comments</span>
                  <span class="mono text-[11px] text-faint"
                        x-text="commentsFor(inj.id).length"></span>
                </div>
                <div x-show="commentsFor(inj.id).length"
                     class="space-y-2 mb-3">
                  <template x-for="comment in commentsFor(inj.id)" :key="comment.id">
                    <div class="rounded-md ring-rule paper-soft px-3 py-2">
                      <div class="flex items-center gap-2 mb-1">
                        <span class="text-[12.5px] font-medium"
                              x-text="comment.author_name || ('User #' + comment.user_id)"></span>
                        <span class="mono text-[10.5px] text-faint"
                              x-text="fmtAgo(comment.created_at)"></span>
                      </div>
                      <p class="text-[13px] text-ink-soft whitespace-pre-wrap"
                         x-text="comment.content"></p>
                    </div>
                  </template>
                </div>
                <template x-if="!isObserver && inj.state === 'released' && exercise.state === 'active'">
                  <div>
                    <textarea x-model="commentDraft[inj.id]"
                              placeholder="Add a team comment…"
                              rows="2"
                              class="w-full rounded-md ring-rule px-3 py-2 text-[13px] resize-none bg-surface"></textarea>
                    <div class="flex items-center gap-3 mt-2">
                      <button @click="submitComment(inj)"
                              :disabled="!canComment(inj)"
                              class="btn btn-ghost h-7 px-3 text-[12px] disabled:opacity-40">
                        <span x-text="commentSubmitting[inj.id] ? 'Posting…' : 'Post comment'"></span>
                      </button>
                      <p x-show="commentErrors[inj.id]"
                         class="text-[12px] text-red-400"
                         x-text="commentErrors[inj.id]"></p>
                    </div>
                  </div>
                </template>
              </div>
            </div>
          </article>
        </template>

        <!-- Waiting placeholder -->
        <div x-show="injects.length === 0"
             class="rounded-md py-6 text-center smallcaps text-faint ring-rule"
             style="background: var(--paper);">
          Waiting for the facilitator…
        </div>
        <div x-show="injects.length > 0 && !currentBriefId"
             class="rounded-md py-6 text-center smallcaps text-faint ring-rule"
             style="background: var(--paper);">
          All released briefs have responses.
        </div>
      </div>

    </div>
  </template>
</div>
{% endblock %}

{% block scripts %}
<script>
function participantView(exerciseId) {
  return {
    loading: true,
    exercise: null,
    role: '',
    injects: [],
    comments: [],
    freeText: {},
    commentDraft: {},
    selectedOption: {},
    submitting: {},
    commentSubmitting: {},
    submitted: {},
    responseErrors: {},
    commentErrors: {},
    ws: null,
    wsConnected: false,
    pingInterval: null,
    reconnectTimeout: null,
    destroyed: false,

    get isObserver() { return this.role === 'observer'; },
    get currentBriefId() {
      const current = this.injects.find(inj => inj.state === 'released' && !this.submitted[inj.id]);
      return current ? current.id : null;
    },

    async init() {
      const [me, er, ir, rr, cr] = await Promise.all([
        apiFetch('/auth/me'),
        apiFetch(`/exercises/${exerciseId}`),
        apiFetch(`/exercises/${exerciseId}/injects`),
        apiFetch(`/exercises/${exerciseId}/responses`),
        apiFetch(`/exercises/${exerciseId}/inject-comments`),
      ]);
      if (me && me.ok) { const d = await me.json(); this.role = d.role; }
      if (er && er.ok) this.exercise = await er.json();
      if (rr && rr.ok) {
        const responses = await rr.json();
        this.submitted = Object.fromEntries(responses.map(r => [r.inject_id, true]));
      }
      if (cr && cr.ok) this.comments = await cr.json();
      if (ir && ir.ok) {
        const all = await ir.json();
        for (const inj of all.filter(i => i.state === 'released' || i.state === 'resolved')) {
          await this._enrichAndAdd(inj);
        }
      }
      this.loading = false;
      this.connectWs();
    },

    async _enrichAndAdd(inj) {
      inj._options = inj.options || [];
      const idx = this.injects.findIndex(i => i.id === inj.id);
      if (idx === -1) this.injects.push(inj);
      else this.injects[idx] = { ...this.injects[idx], ...inj };
      this.sortInjects();
    },

    sortInjects() {
      this.injects.sort((a, b) => {
        const aReleased = a.released_at ? new Date(a.released_at).getTime() : Number.MAX_SAFE_INTEGER;
        const bReleased = b.released_at ? new Date(b.released_at).getTime() : Number.MAX_SAFE_INTEGER;
        if (aReleased !== bReleased) return aReleased - bReleased;
        if ((a.sequence_order || 0) !== (b.sequence_order || 0)) {
          return (a.sequence_order || 0) - (b.sequence_order || 0);
        }
        return (a.id || 0) - (b.id || 0);
      });
    },

    isCurrentBrief(inj) {
      return inj.id === this.currentBriefId;
    },

    commentsFor(injectId) {
      return this.comments
        .filter(comment => comment.inject_id === injectId)
        .sort((a, b) => new Date(a.created_at).getTime() - new Date(b.created_at).getTime());
    },

    briefLabel(inj) {
      if (this.isCurrentBrief(inj)) return 'Current brief';
      if (this.submitted[inj.id] || inj.state === 'resolved') return 'Completed brief';
      return 'Later brief';
    },

    requiresFreeText(inj) {
      return inj.free_text_response !== false || !(inj._options && inj._options.length);
    },

    canSubmit(inj) {
      if (this.exercise.state === 'paused' || this.submitting[inj.id]) return false;
      return !this.requiresFreeText(inj) || !!(this.freeText[inj.id] || '').trim();
    },

    canComment(inj) {
      if (this.exercise.state !== 'active' || this.commentSubmitting[inj.id]) return false;
      return !!(this.commentDraft[inj.id] || '').trim();
    },

    connectWs() {
      const token = localStorage.getItem('dt_token');
      if (!token) return;
      const proto = location.protocol === 'https:' ? 'wss' : 'ws';
      const params = new URLSearchParams({ token });
      const viewRole = localStorage.getItem('dt_view_role');
      const viewTeam = localStorage.getItem('dt_view_team');
      if (viewRole) params.set('view_role', viewRole);
      if (viewTeam) params.set('view_team', viewTeam);
      this.ws = new WebSocket(`${proto}://${location.host}/ws/exercises/${exerciseId}?${params}`);

      this.ws.onopen = () => {
        this.wsConnected = true;
        this.pingInterval = setInterval(() => {
          if (this.ws && this.ws.readyState === WebSocket.OPEN)
            this.ws.send(JSON.stringify({ type: 'ping' }));
        }, 30000);
      };

      this.ws.onclose = () => {
        this.wsConnected = false;
        clearInterval(this.pingInterval);
        this.pingInterval = null;
        if (!this.destroyed) this.reconnectTimeout = setTimeout(() => this.connectWs(), 3000);
      };

      this.ws.onmessage = async (ev) => {
        const msg = JSON.parse(ev.data);
        if (msg.type === 'inject_released') {
          await this._enrichAndAdd(msg.payload);
        }
        if (msg.type === 'exercise_state_change') {
          this.exercise = { ...this.exercise, state: msg.payload.state };
        }
        if (msg.type === 'inject_comment_created') {
          this.upsertComment(msg.payload);
        }
      };
    },

    destroy() {
      this.destroyed = true;
      if (this.pingInterval) clearInterval(this.pingInterval);
      if (this.reconnectTimeout) clearTimeout(this.reconnectTimeout);
      this.pingInterval = null;
      this.reconnectTimeout = null;
      if (this.ws) {
        this.ws.onclose = null;
        this.ws.close();
        this.ws = null;
      }
    },

    async submitResponse(inj) {
      const content = (this.freeText[inj.id] || '').trim();
      if (!content) return;
      this.responseErrors = { ...this.responseErrors, [inj.id]: '' };
      this.submitting = { ...this.submitting, [inj.id]: true };
      const r = await apiFetch(`/exercises/${exerciseId}/responses`, {
        method: 'POST',
        body: JSON.stringify({
          inject_id: inj.id,
          content,
          selected_option: this.selectedOption[inj.id] || null,
        }),
      });
      this.submitting = { ...this.submitting, [inj.id]: false };
      if (r && r.ok) {
        this.submitted = { ...this.submitted, [inj.id]: true };
        return;
      }

      const data = await readJson(r, {});
      const message = data.detail || 'Response could not be submitted.';
      if (r && r.status === 409 && message.toLowerCase().includes('already submitted')) {
        this.submitted = { ...this.submitted, [inj.id]: true };
        return;
      }
      this.responseErrors = { ...this.responseErrors, [inj.id]: message };
    },

    upsertComment(comment) {
      if (!comment || !comment.id) return;
      const idx = this.comments.findIndex(c => c.id === comment.id);
      if (idx === -1) this.comments = [...this.comments, comment];
      else {
        this.comments[idx] = { ...this.comments[idx], ...comment };
        this.comments = [...this.comments];
      }
    },

    async submitComment(inj) {
      const content = (this.commentDraft[inj.id] || '').trim();
      if (!content) return;
      this.commentErrors = { ...this.commentErrors, [inj.id]: '' };
      this.commentSubmitting = { ...this.commentSubmitting, [inj.id]: true };
      const r = await apiFetch(`/exercises/${exerciseId}/inject-comments`, {
        method: 'POST',
        body: JSON.stringify({ inject_id: inj.id, content }),
      });
      this.commentSubmitting = { ...this.commentSubmitting, [inj.id]: false };
      if (r && r.ok) {
        const comment = await r.json();
        this.upsertComment(comment);
        this.commentDraft = { ...this.commentDraft, [inj.id]: '' };
        return;
      }
      const data = await readJson(r, {});
      this.commentErrors = {
        ...this.commentErrors,
        [inj.id]: data.detail || 'Comment could not be posted.',
      };
    },

    fmtTime(s) { return fmtTime(s); },
    fmtAgo(s) { return fmtAgo(s); },
  }
}
</script>
{% endblock %}
