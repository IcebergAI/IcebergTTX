{% extends "base.html" %}
{% block title %}After-Action Report — IcebergTTX{% endblock %}

{% block content %}
<div x-data="afterActionReport({{ exercise_id }})" class="workspace report-page">

  <div x-show="loading" class="text-muted text-[13.5px] mt-6">Loading report…</div>
  <div x-show="error" x-cloak class="mt-6 rounded-md px-3 py-2.5 text-[13px]"
       style="background:#fee2e2; color:#b91c1c;" x-text="error"></div>

  <template x-if="report">
    <div>
      <!-- Header -->
      <div class="page-head">
        <div>
          <div class="eyebrow eyebrow-accent" x-text="exId"></div>
          <h1 class="page-title">After-Action Report</h1>
          <p class="lede mt-1" x-text="exTitle"></p>
        </div>
        <div class="flex items-center gap-2 no-print">
          <a :href="reviewHref" class="btn h-8 px-3 text-[13px]">← Review</a>
          <a :href="markdownHref" target="_blank" class="btn h-8 px-3 text-[13px]">Markdown</a>
          <button @click="printReport()" class="btn btn-primary h-8 px-3 text-[13px]">Print / PDF</button>
        </div>
      </div>

      <!-- Overview -->
      <section class="report-section mt-6">
        <div class="section-title mb-3">Overview</div>
        <dl class="grid gap-x-6 gap-y-2 sm:grid-cols-2 text-[13.5px]">
          <div class="flex gap-2"><dt class="smallcaps text-muted w-28 shrink-0">Scenario</dt>
            <dd x-text="report.scenario.title || '—'"></dd></div>
          <div class="flex gap-2"><dt class="smallcaps text-muted w-28 shrink-0">Status</dt>
            <dd x-text="report.exercise.state"></dd></div>
          <div class="flex gap-2"><dt class="smallcaps text-muted w-28 shrink-0">Started</dt>
            <dd class="mono" x-text="fmtTime(report.exercise.started_at)"></dd></div>
          <div class="flex gap-2"><dt class="smallcaps text-muted w-28 shrink-0">Ended</dt>
            <dd class="mono" x-text="fmtTime(report.exercise.ended_at)"></dd></div>
          <div class="flex gap-2"><dt class="smallcaps text-muted w-28 shrink-0">Duration</dt>
            <dd class="mono" x-text="report.exercise.duration || '—'"></dd></div>
          <div class="flex gap-2"><dt class="smallcaps text-muted w-28 shrink-0">Teams</dt>
            <dd x-text="teamsLabel"></dd></div>
          <div class="flex gap-2"><dt class="smallcaps text-muted w-28 shrink-0">Participants</dt>
            <dd class="mono" x-text="report.member_count"></dd></div>
        </dl>
        <p x-show="report.scenario.description" class="lede mt-3" x-text="report.scenario.description"></p>
      </section>

      <!-- Executive summary -->
      <section class="report-section mt-8" x-show="showSummarySection" x-cloak>
        <div class="section-title mb-3">Executive Summary</div>

        <!-- Editable (a provider is configured + AI is on for this exercise) -->
        <template x-if="available">
          <div>
            <div class="no-print flex items-center justify-between mb-2">
              <button @click="draftSummary()" :disabled="summaryDrafting"
                      class="btn h-8 px-3 text-[13px]"
                      x-text="summaryDrafting ? 'Drafting…' : (hasSummary ? 'Redraft with AI' : 'Draft with AI')"></button>
              <div class="flex items-center gap-2">
                <span x-show="summarySaved" x-cloak class="pill mono bg-st-active">Saved</span>
                <button @click="saveSummary()" :disabled="summarySaving"
                        class="btn btn-primary h-8 px-3 text-[13px]"
                        x-text="summarySaving ? 'Saving…' : 'Save'"></button>
              </div>
            </div>
            <textarea x-model="summaryText" rows="8"
                      placeholder="Draft with AI or write the executive summary here…"
                      class="no-print w-full ring-rule rounded-md px-3 py-2 text-[13.5px] bg-surface"></textarea>
            <!-- Printed form of the summary -->
            <p class="print-only whitespace-pre-wrap" x-text="summaryText"></p>
          </div>
        </template>

        <!-- Read-only (no provider / AI off, but a summary was drafted earlier) -->
        <template x-if="!available && hasSummary">
          <p class="text-[13.5px] whitespace-pre-wrap" x-text="summaryText"></p>
        </template>
      </section>

      <!-- Decision summary -->
      <section class="report-section mt-8">
        <div class="section-title mb-3">Decision Summary</div>
        <template x-if="!hasInjects">
          <p class="text-[13px] text-muted">No injects were released.</p>
        </template>
        <template x-for="(inj, ii) in report.injects" :key="ii">
          <div class="report-inject node mb-3">
            <div class="flex items-center justify-between gap-3 flex-wrap">
              <span class="text-[14px] font-semibold" x-text="inj.title"></span>
              <span class="mono text-[11px] text-muted"
                    x-text="'released ' + fmtTime(inj.released_at) + ' · ' + inj.released_by"></span>
            </div>
            <template x-if="!inj.responses.length">
              <p class="text-[12px] text-muted mt-1">No responses recorded.</p>
            </template>
            <div class="mt-2 space-y-2">
              <template x-for="(r, ri) in inj.responses" :key="ri">
                <div class="text-[13px]">
                  <div class="flex items-center gap-2 flex-wrap">
                    <span class="font-medium" x-text="r.author"></span>
                    <template x-if="r.selected_option">
                      <span class="pill mono" x-text="'opt: ' + r.selected_option"></span>
                    </template>
                    <template x-if="r.decision_quality">
                      <span :class="qualityClass(r.decision_quality)" x-text="qualityLabel(r.decision_quality)"></span>
                    </template>
                  </div>
                  <p class="whitespace-pre-wrap mt-0.5" x-text="r.content"></p>
                  <p x-show="r.assessment_text" class="text-[12px] text-muted italic mt-0.5"
                     x-text="r.assessment_text"></p>
                </div>
              </template>
            </div>
          </div>
        </template>
      </section>

      <!-- Communications -->
      <section class="report-section mt-8">
        <div class="section-title mb-3">Communications Log</div>
        <template x-if="!hasComms">
          <p class="text-[13px] text-muted">No communications were sent.</p>
        </template>
        <div class="space-y-2">
          <template x-for="(c, ci) in report.communications" :key="ci">
            <div class="text-[13px]">
              <div class="flex items-center gap-2 flex-wrap">
                <span class="pill mono" x-text="c.direction"></span>
                <span class="font-medium" x-text="c.subject"></span>
                <template x-if="c.external_entity">
                  <span class="text-muted" x-text="'· ' + c.external_entity"></span>
                </template>
                <span class="mono text-[11px] text-muted" x-text="fmtTime(c.sent_at)"></span>
              </div>
              <p x-show="c.body" class="whitespace-pre-wrap mt-0.5" x-text="c.body"></p>
            </div>
          </template>
        </div>
      </section>

      <!-- Debrief -->
      <section class="report-section mt-8" x-show="hasDebrief" x-cloak>
        <div class="section-title mb-3">Debrief</div>
        <div x-show="report.debrief.scenario_debrief_notes" class="mb-3">
          <div class="smallcaps text-muted mb-1">Scenario prompts</div>
          <p class="text-[13.5px] whitespace-pre-wrap text-ink-soft" x-text="report.debrief.scenario_debrief_notes"></p>
        </div>
        <div x-show="report.debrief.debrief_notes">
          <div class="smallcaps text-muted mb-1">Facilitator notes</div>
          <p class="text-[13.5px] whitespace-pre-wrap" x-text="report.debrief.debrief_notes"></p>
        </div>
      </section>

    </div>
  </template>
</div>
{% endblock %}
