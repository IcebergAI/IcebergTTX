{% extends "base.html" %}
{% block title %}Exercises — IcebergTTX{% endblock %}

{% block content %}
<div x-data="exerciseList({{ show_create|default(false)|tojson }})" class="workspace">

  <div class="page-head">
    <div>
      <h1 class="page-title">Exercises</h1>
      <p class="text-[13.5px] text-muted mt-1">Prepare, run, and review tabletop sessions.</p>
    </div>
    <template x-if="isF">
      <button @click="showCreate = true"
              class="btn btn-primary h-8 px-3 text-[13px]">+ New exercise</button>
    </template>
  </div>

  <!-- Create modal -->
  <div x-show="showCreate" x-cloak
       class="fixed inset-0 bg-black/40 flex items-center justify-center z-50"
       @keydown.escape.window="showCreate = false">
    <div class="paper ring-rule rounded-xl w-full max-w-md p-6 shadow-xl" @click.stop>
      <h2 class="text-[18px] font-semibold mb-4">New exercise</h2>

      <div x-show="createError"
           class="mb-4 rounded-md px-3 py-2.5 text-[13px]"
           style="background:#fee2e2; color:#b91c1c;"
           x-text="createError"></div>

      <div class="space-y-3">
        <div>
          <label class="block smallcaps text-muted mb-1">Title <span class="text-red-400">*</span></label>
          <input type="text" x-model="newTitle"
                 class="w-full ring-rule rounded-md px-3 py-2 text-[13.5px] bg-surface" />
        </div>
        <div>
          <label class="block smallcaps text-muted mb-1">Scenario <span class="text-red-400">*</span></label>
          <select x-model="newScenarioId"
                  class="w-full ring-rule rounded-md px-3 py-2 text-[13.5px] bg-surface">
            <option value="">— select a scenario —</option>
            <template x-for="s in scenarios" :key="s.id">
              <option :value="s.id" x-text="s.title"></option>
            </template>
          </select>
        </div>
        <div class="flex items-center gap-2.5">
          <input type="checkbox" id="llm_enabled" x-model="newLlmEnabled"
                 class="rounded accent-accent-ink" />
          <label for="llm_enabled" class="text-[13px] text-ink-soft">Enable LLM assessment</label>
        </div>
      </div>

      <div class="flex gap-3 mt-5">
        <button @click="createExercise()" :disabled="creating"
                class="btn btn-primary h-9 px-5 text-[13px] disabled:opacity-50">
          <span x-text="creating ? 'Creating…' : 'Create'"></span>
        </button>
        <button @click="showCreate = false"
                class="btn btn-ghost h-9 px-4 text-[13px]">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Exercise list -->
  <div x-show="loading" class="smallcaps text-faint py-8 text-center">Loading…</div>

  <div x-show="!loading" class="surface overflow-hidden">
    <template x-if="!loading && exercises.length === 0">
      <div class="px-5 py-10 text-center smallcaps text-faint">
        No exercises yet.
        <template x-if="isF">
          <button @click="showCreate = true" class="underline hover:text-ink-soft ml-1">Create one.</button>
        </template>
      </div>
    </template>

    <template x-for="ex in exercises" :key="ex.id">
      <div class="px-5 py-4 flex items-center gap-4 border-b rule last:border-b-0">
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2.5">
            <span class="text-[14px] font-medium" x-text="ex.title"></span>
            <span class="pill" :class="stateBadgeClass(ex.state)">
              <span x-show="ex.state === 'active'" class="live-dot"></span>
              <span x-show="ex.state !== 'active'" class="dot" :class="stateDotClass(ex.state)"></span>
              <span x-text="ex.state"></span>
            </span>
          </div>
          <div class="mono text-[11.5px] text-muted mt-0.5"
               x-text="'EX-' + padId(ex.id, 3) + (ex.started_at ? ' · started ' + fmtTime(ex.started_at) : '')"></div>
        </div>

        <div class="flex items-center gap-2 shrink-0">
          <!-- Lifecycle buttons (facilitator only) -->
          <template x-if="isF">
            <div class="flex gap-1.5">
              <button x-show="ex.state === 'draft'" @click="doTransition(ex, 'start')"
                      class="btn h-7 px-2.5 text-[12px]"
                      style="background:#dcfce7; color:#166534; box-shadow: inset 0 0 0 1px #bbf7d0;">Start</button>
              <button x-show="ex.state === 'active'" @click="doTransition(ex, 'pause')"
                      class="btn h-7 px-2.5 text-[12px]"
                      style="background:#fef4e0; color:#8a5a0d; box-shadow: inset 0 0 0 1px #fde68a;">Pause</button>
              <button x-show="ex.state === 'paused'" @click="doTransition(ex, 'resume')"
                      class="btn h-7 px-2.5 text-[12px]"
                      style="background:#dcfce7; color:#166534; box-shadow: inset 0 0 0 1px #bbf7d0;">Resume</button>
              <button x-show="ex.state === 'active' || ex.state === 'paused'"
                      @click="doTransition(ex, 'complete')"
                      class="btn h-7 px-2.5 text-[12px]"
                      style="background:#e6eef8; color:#2f5b8a; box-shadow: inset 0 0 0 1px #c5d7ec;">Complete</button>
            </div>
          </template>

          <a :href="isF ? '/exercises/' + ex.id + '/facilitate' : '/exercises/' + ex.id + '/participate'"
             class="btn btn-ghost h-7 px-2.5 text-[12px]">Open</a>

          <template x-if="isF && ex.state === 'draft'">
            <button @click="deleteExercise(ex.id)"
                    class="smallcaps text-red-400 hover:text-red-600 text-[10.5px]">Delete</button>
          </template>
        </div>
      </div>
    </template>
  </div>

</div>
{% endblock %}
