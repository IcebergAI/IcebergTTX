{% extends "base.html" %}
{% block title %}Exercises — Deep Thought{% endblock %}

{% block content %}
<div x-data="exerciseList()" x-init="init()" class="workspace">

  <div class="page-head">
    <div>
      <h1 class="page-title">Exercises</h1>
      <p class="text-[13.5px] text-stone-500 mt-1">Prepare, run, and review tabletop sessions.</p>
    </div>
    <template x-if="isF">
      <button @click="showCreate = true"
              class="btn btn-primary h-8 px-3 text-[13px]">+ New exercise</button>
    </template>
  </div>

  <!-- Create modal -->
  <div x-show="showCreate" x-cloak
       class="fixed inset-0 bg-black/40 flex items-center justify-center z-50"
       @keydown.escape.window="showCreate = false">
    <div class="paper ring-rule rounded-xl w-full max-w-md p-6 shadow-xl" @click.stop>
      <h2 class="text-[18px] font-semibold mb-4">New exercise</h2>

      <div x-show="createError"
           class="mb-4 rounded-md px-3 py-2.5 text-[13px]"
           style="background:#fee2e2; color:#b91c1c;"
           x-text="createError"></div>

      <div class="space-y-3">
        <div>
          <label class="block smallcaps text-stone-500 mb-1">Title <span class="text-red-400">*</span></label>
          <input type="text" x-model="newTitle"
                 class="w-full ring-rule rounded-md px-3 py-2 text-[13.5px] bg-white" />
        </div>
        <div>
          <label class="block smallcaps text-stone-500 mb-1">Scenario <span class="text-red-400">*</span></label>
          <select x-model="newScenarioId"
                  class="w-full ring-rule rounded-md px-3 py-2 text-[13.5px] bg-white">
            <option value="">— select a scenario —</option>
            <template x-for="s in scenarios" :key="s.id">
              <option :value="s.id" x-text="s.title"></option>
            </template>
          </select>
        </div>
        <div class="flex items-center gap-2.5">
          <input type="checkbox" id="llm_enabled" x-model="newLlmEnabled"
                 class="rounded accent-stone-700" />
          <label for="llm_enabled" class="text-[13px] text-stone-600">Enable LLM assessment</label>
        </div>
      </div>

      <div class="flex gap-3 mt-5">
        <button @click="createExercise()" :disabled="creating"
                class="btn btn-primary h-9 px-5 text-[13px] disabled:opacity-50">
          <span x-text="creating ? 'Creating…' : 'Create'"></span>
        </button>
        <button @click="showCreate = false"
                class="btn btn-ghost h-9 px-4 text-[13px]">Cancel</button>
      </div>
    </div>
  </div>

  <!-- Exercise list -->
  <div x-show="loading" class="smallcaps text-stone-400 py-8 text-center">Loading…</div>

  <div x-show="!loading" class="surface overflow-hidden">
    <template x-if="!loading && exercises.length === 0">
      <div class="px-5 py-10 text-center smallcaps text-stone-400">
        No exercises yet.
        <template x-if="isF">
          <button @click="showCreate = true" class="underline hover:text-stone-700 ml-1">Create one.</button>
        </template>
      </div>
    </template>

    <template x-for="ex in exercises" :key="ex.id">
      <div class="px-5 py-4 flex items-center gap-4 border-b rule last:border-b-0">
        <div class="flex-1 min-w-0">
          <div class="flex items-center gap-2.5">
            <span class="text-[14px] font-medium" x-text="ex.title"></span>
            <span x-html="stateBadge(ex.state)"></span>
          </div>
          <div class="mono text-[11.5px] text-stone-500 mt-0.5"
               x-text="'EX-' + String(ex.id).padStart(3,'0') + (ex.started_at ? ' · started ' + fmtTime(ex.started_at) : '')"></div>
        </div>

        <div class="flex items-center gap-2 shrink-0">
          <!-- Lifecycle buttons (facilitator only) -->
          <template x-if="isF">
            <div class="flex gap-1.5">
              <button x-show="ex.state === 'draft'" @click="doTransition(ex, 'start')"
                      class="btn h-7 px-2.5 text-[12px]"
                      style="background:#dcfce7; color:#166534; box-shadow: inset 0 0 0 1px #bbf7d0;">Start</button>
              <button x-show="ex.state === 'active'" @click="doTransition(ex, 'pause')"
                      class="btn h-7 px-2.5 text-[12px]"
                      style="background:#fef4e0; color:#8a5a0d; box-shadow: inset 0 0 0 1px #fde68a;">Pause</button>
              <button x-show="ex.state === 'paused'" @click="doTransition(ex, 'resume')"
                      class="btn h-7 px-2.5 text-[12px]"
                      style="background:#dcfce7; color:#166534; box-shadow: inset 0 0 0 1px #bbf7d0;">Resume</button>
              <button x-show="ex.state === 'active' || ex.state === 'paused'"
                      @click="doTransition(ex, 'complete')"
                      class="btn h-7 px-2.5 text-[12px]"
                      style="background:#e6eef8; color:#2f5b8a; box-shadow: inset 0 0 0 1px #c5d7ec;">Complete</button>
            </div>
          </template>

          <a :href="isF ? '/exercises/' + ex.id + '/facilitate' : '/exercises/' + ex.id + '/participate'"
             class="btn btn-ghost h-7 px-2.5 text-[12px]">Open</a>

          <template x-if="isF && ex.state === 'draft'">
            <button @click="deleteExercise(ex.id)"
                    class="smallcaps text-red-400 hover:text-red-600 text-[10.5px]">Delete</button>
          </template>
        </div>
      </div>
    </template>
  </div>

</div>
{% endblock %}

{% block scripts %}
<script>
function exerciseList() {
  return {
    loading: true,
    exercises: [],
    scenarios: [],
    isF: false,
    showCreate: {% if show_create %}true{% else %}false{% endif %},
    newTitle: '',
    newScenarioId: '',
    newLlmEnabled: false,
    creating: false,
    createError: '',

    async init() {
      const me = await apiFetch('/auth/me');
      if (!me) return;
      const meData = await readJson(me);
      if (!meData) return;
      this.isF = meData.role === 'facilitator';

      const [er, sr] = await Promise.all([
        apiFetch('/exercises'),
        this.isF ? apiFetch('/scenarios') : Promise.resolve(null),
      ]);
      if (er && er.ok) this.exercises = await readJson(er, []);
      if (sr && sr.ok) this.scenarios = await readJson(sr, []);
      this.loading = false;
    },

    async load() {
      const r = await apiFetch('/exercises');
      if (r && r.ok) this.exercises = await readJson(r, []);
    },

    async createExercise() {
      if (!this.newTitle || !this.newScenarioId) {
        this.createError = 'Title and scenario are required.';
        return;
      }
      this.creating = true; this.createError = '';
      const r = await apiFetch('/exercises', {
        method: 'POST',
        body: JSON.stringify({
          title: this.newTitle,
          scenario_id: parseInt(this.newScenarioId),
          llm_enabled: this.newLlmEnabled,
        }),
      });
      this.creating = false;
      if (r && r.ok) {
        this.showCreate = false;
        this.newTitle = ''; this.newScenarioId = ''; this.newLlmEnabled = false;
        await this.load();
      } else if (r) {
        const data = await r.json();
        this.createError = data.detail || 'Failed to create exercise.';
      }
    },

    async doTransition(ex, action) {
      const r = await apiFetch(`/exercises/${ex.id}/${action}`, { method: 'POST' });
      if (r && r.ok) {
        const updated = await r.json();
        const idx = this.exercises.findIndex(e => e.id === ex.id);
        if (idx !== -1) this.exercises[idx] = updated;
      }
    },

    async deleteExercise(id) {
      if (!confirm('Delete this exercise?')) return;
      await apiFetch(`/exercises/${id}`, { method: 'DELETE' });
      await this.load();
    },

    stateBadge(s) { return stateBadge(s); },
    fmtTime(s) { return fmtTime(s); },
  }
}
</script>
{% endblock %}
