# IMPORTANT: replicas must remain 1.
# Every piece of cross-request state the app keeps lives in the process, so a
# second replica would not share it. Redis pub/sub in ws_manager.py is NOT
# sufficient on its own — it only fixes the first of these:
#   - ws_manager.py       WebSocket fan-out       -> shared bus (Redis pub/sub)
#   - schedule_service    scheduled inject release, and the delayed triggered
#                         comms in communication_service: in-process asyncio
#                         tasks, lost or duplicated per replica
#                                                 -> task queue (Celery/ARQ)
#   - rate_limit          per-process attempt counters, so a 2nd replica
#                         DOUBLES the effective login/registration/reset limits
#                                                 -> shared store
#   - SiemConfig/ProxyConfig caches: an admin's policy change would not reach
#                         the other replica       -> cross-replica invalidation
# See website/docs/deployment.md for the full table.
#
# strategy: Recreate ensures the old pod is terminated before the new one
# starts, so there is never a brief window with 2 replicas running.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iceberg-ttx-app
  namespace: iceberg-ttx
  labels:
    app.kubernetes.io/name: iceberg-ttx-app
    app.kubernetes.io/part-of: iceberg-ttx
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: iceberg-ttx-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: iceberg-ttx-app
        app.kubernetes.io/part-of: iceberg-ttx
    spec:
      # No pod talks to the Kubernetes API — don't mount a usable token.
      automountServiceAccountToken: false
      # PSS "restricted": run as the image's non-root appuser and default seccomp.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        # Populate the shared emptyDir with compiled static assets from the
        # image so Caddy (which has its own copy) can serve them directly.
        - name: copy-static
          image: ghcr.io/icebergai/iceberg-ttx:0.1.0-beta.1  # pin by digest (…@sha256:) in prod
          # Do not preserve source timestamps/ownership: the destination
          # emptyDir is fsGroup-writable but root-owned on several runtimes.
          command: ["/bin/sh", "-c", "cp -rL /app/static_src/. /app/static/"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: static-files
              mountPath: /app/static
      containers:
        - name: app
          image: ghcr.io/icebergai/iceberg-ttx:0.1.0-beta.1  # pin by digest (…@sha256:) in prod
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: iceberg-ttx-secrets
                  key: DATABASE_URL
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: iceberg-ttx-secrets
                  key: SECRET_KEY
            # Pluggable AI provider (#26). LLM_PROVIDER + model/endpoint routing
            # come from the ConfigMap; provider API keys from the Secret. Only the
            # vars for the selected provider need real values.
            - name: LLM_PROVIDER
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: LLM_PROVIDER
            - name: LLM_MAX_TOKENS
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: LLM_MAX_TOKENS
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: iceberg-ttx-secrets
                  key: ANTHROPIC_API_KEY
            - name: ANTHROPIC_MODEL
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: ANTHROPIC_MODEL
            - name: BEDROCK_MODEL
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: BEDROCK_MODEL
            - name: BEDROCK_AWS_REGION
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: BEDROCK_AWS_REGION
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: iceberg-ttx-secrets
                  key: OPENAI_API_KEY
            - name: OPENAI_MODEL
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: OPENAI_MODEL
            - name: OPENAI_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: OPENAI_BASE_URL
            - name: OLLAMA_MODEL
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: OLLAMA_MODEL
            - name: OLLAMA_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: OLLAMA_BASE_URL
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: iceberg-ttx-secrets
                  key: GEMINI_API_KEY
            - name: GEMINI_MODEL
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: GEMINI_MODEL
            - name: ACCESS_TOKEN_EXPIRE_MINUTES
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: ACCESS_TOKEN_EXPIRE_MINUTES
            # General policy values seed /admin/settings on first startup.
            - name: REGISTRATION_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: REGISTRATION_ENABLED
            - name: AUDIT_PERSIST
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: AUDIT_PERSIST
            - name: LOGIN_MAX_ATTEMPTS
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: LOGIN_MAX_ATTEMPTS
            - name: LOGIN_LOCKOUT_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: LOGIN_LOCKOUT_SECONDS
            - name: REGISTRATION_MAX_ATTEMPTS
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: REGISTRATION_MAX_ATTEMPTS
            - name: REGISTRATION_LOCKOUT_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: REGISTRATION_LOCKOUT_SECONDS
            - name: PASSWORD_RESET_MAX_ATTEMPTS
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: PASSWORD_RESET_MAX_ATTEMPTS
            - name: PASSWORD_RESET_LOCKOUT_SECONDS
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: PASSWORD_RESET_LOCKOUT_SECONDS
            # Email (#186) — non-secret fields seed /admin/email; password stays Secret-only.
            - name: SMTP_HOST
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: SMTP_HOST
            - name: SMTP_PORT
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: SMTP_PORT
            - name: SMTP_FROM
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: SMTP_FROM
            - name: SMTP_USERNAME
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: SMTP_USERNAME
            - name: SMTP_STARTTLS
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: SMTP_STARTTLS
            - name: SMTP_TLS
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: SMTP_TLS
            - name: PUBLIC_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: PUBLIC_BASE_URL
            - name: SMTP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: iceberg-ttx-secrets
                  key: SMTP_PASSWORD
            - name: FORWARDED_ALLOW_IPS
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: FORWARDED_ALLOW_IPS
            # Safety net for the WS CSWSH origin check (#68): set to the public
            # origin in the ConfigMap if any hop rewrites the Host header.
            - name: TRUSTED_ORIGINS
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: TRUSTED_ORIGINS
            # SIEM forwarding (#24) — non-secret routing from the ConfigMap; the
            # HTTP bearer token comes from the Secret. The app forwards audit
            # events itself (no sidecar).
            - name: SIEM_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: SIEM_ENABLED
            - name: SIEM_METHODS
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: SIEM_METHODS
            - name: SIEM_MIN_SEVERITY
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: SIEM_MIN_SEVERITY
            - name: SIEM_SYSLOG_HOST
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: SIEM_SYSLOG_HOST
            - name: SIEM_SYSLOG_PORT
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: SIEM_SYSLOG_PORT
            - name: SIEM_SYSLOG_PROTOCOL
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: SIEM_SYSLOG_PROTOCOL
            - name: SIEM_HTTP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: SIEM_HTTP_ENDPOINT
            - name: SIEM_HTTP_VERIFY_TLS
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: SIEM_HTTP_VERIFY_TLS
            - name: SIEM_HTTP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: iceberg-ttx-secrets
                  key: SIEM_HTTP_TOKEN
            # Outbound proxy (#97) — non-secret routing from the ConfigMap; the proxy
            # credentials come from the Secret. Seeds the admin-editable /admin/proxy row.
            - name: PROXY_MODE
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: PROXY_MODE
            - name: PROXY_URL
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: PROXY_URL
            - name: PROXY_NO_PROXY
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: PROXY_NO_PROXY
            - name: PROXY_USERNAME
              valueFrom:
                secretKeyRef:
                  name: iceberg-ttx-secrets
                  key: PROXY_USERNAME
            - name: PROXY_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: iceberg-ttx-secrets
                  key: PROXY_PASSWORD
            # OIDC / SSO (#25) — non-secret routing from the ConfigMap; the client
            # secrets come from the Secret. A disabled provider needs no secret.
            - name: AUTH_MODE
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: AUTH_MODE
            - name: OIDC_REDIRECT_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: OIDC_REDIRECT_BASE_URL
            - name: OIDC_ENTRA_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: OIDC_ENTRA_ENABLED
            - name: OIDC_ENTRA_TENANT_ID
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: OIDC_ENTRA_TENANT_ID
            - name: OIDC_ENTRA_CLIENT_ID
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: OIDC_ENTRA_CLIENT_ID
            - name: OIDC_ENTRA_ROLE_CLAIM
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: OIDC_ENTRA_ROLE_CLAIM
            - name: OIDC_ENTRA_ROLE_MAP
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: OIDC_ENTRA_ROLE_MAP
            - name: OIDC_ENTRA_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: iceberg-ttx-secrets
                  key: OIDC_ENTRA_CLIENT_SECRET
            - name: OIDC_AUTHENTIK_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: OIDC_AUTHENTIK_ENABLED
            - name: OIDC_AUTHENTIK_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: OIDC_AUTHENTIK_BASE_URL
            - name: OIDC_AUTHENTIK_APP_SLUG
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: OIDC_AUTHENTIK_APP_SLUG
            - name: OIDC_AUTHENTIK_CLIENT_ID
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: OIDC_AUTHENTIK_CLIENT_ID
            - name: OIDC_AUTHENTIK_ROLE_MAP
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: OIDC_AUTHENTIK_ROLE_MAP
            - name: OIDC_AUTHENTIK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: iceberg-ttx-secrets
                  key: OIDC_AUTHENTIK_CLIENT_SECRET
            - name: OIDC_AUTH0_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: OIDC_AUTH0_ENABLED
            - name: OIDC_AUTH0_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: OIDC_AUTH0_DOMAIN
            - name: OIDC_AUTH0_CLIENT_ID
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: OIDC_AUTH0_CLIENT_ID
            - name: OIDC_AUTH0_ROLE_CLAIM
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: OIDC_AUTH0_ROLE_CLAIM
            - name: OIDC_AUTH0_ROLE_MAP
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: OIDC_AUTH0_ROLE_MAP
            - name: OIDC_AUTH0_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: iceberg-ttx-secrets
                  key: OIDC_AUTH0_CLIENT_SECRET
            - name: OIDC_OKTA_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: OIDC_OKTA_ENABLED
            - name: OIDC_OKTA_DOMAIN
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: OIDC_OKTA_DOMAIN
            - name: OIDC_OKTA_AUTH_SERVER
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: OIDC_OKTA_AUTH_SERVER
            - name: OIDC_OKTA_CLIENT_ID
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: OIDC_OKTA_CLIENT_ID
            - name: OIDC_OKTA_ROLE_MAP
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: OIDC_OKTA_ROLE_MAP
            - name: OIDC_OKTA_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: iceberg-ttx-secrets
                  key: OIDC_OKTA_CLIENT_SECRET
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
            - name: static-files
              mountPath: /app/static
            # Writable scratch for a read-only root filesystem.
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            # DB-aware readiness (#71): returns 503 when Postgres is unreachable
            # so the pod is pulled from the endpoint set during a DB outage.
            httpGet:
              path: /api/health/ready
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: app-uploads
        - name: static-files
          emptyDir: {}
        - name: tmp
          emptyDir: {}
