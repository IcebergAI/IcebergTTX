# IMPORTANT: replicas must remain 1.
# ws_manager.py holds all WebSocket state in-memory. Scaling beyond 1 replica
# silently breaks broadcasts — clients on different replicas cannot receive
# each other's events. Add Redis pub/sub to ws_manager.py before scaling.
#
# strategy: Recreate ensures the old pod is terminated before the new one
# starts, so there is never a brief window with 2 replicas running.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: iceberg-ttx-app
  namespace: iceberg-ttx
  labels:
    app.kubernetes.io/name: iceberg-ttx-app
    app.kubernetes.io/part-of: iceberg-ttx
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app.kubernetes.io/name: iceberg-ttx-app
  template:
    metadata:
      labels:
        app.kubernetes.io/name: iceberg-ttx-app
        app.kubernetes.io/part-of: iceberg-ttx
    spec:
      # No pod talks to the Kubernetes API — don't mount a usable token.
      automountServiceAccountToken: false
      # PSS "restricted": run as the image's non-root appuser and default seccomp.
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        # Populate the shared emptyDir with compiled static assets from the
        # image so nginx (which has its own copy) can serve them directly.
        - name: copy-static
          image: your-registry/iceberg-ttx:latest  # REPLACE with actual image
          command: ["/bin/sh", "-c", "cp -a /app/static_src/. /app/static/"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: static-files
              mountPath: /app/static
      containers:
        - name: app
          image: your-registry/iceberg-ttx:latest  # REPLACE with actual image
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8000
              name: http
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: iceberg-ttx-secrets
                  key: DATABASE_URL
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: iceberg-ttx-secrets
                  key: SECRET_KEY
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: iceberg-ttx-secrets
                  key: ANTHROPIC_API_KEY
            - name: ACCESS_TOKEN_EXPIRE_MINUTES
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: ACCESS_TOKEN_EXPIRE_MINUTES
            - name: FORWARDED_ALLOW_IPS
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: FORWARDED_ALLOW_IPS
            # SIEM forwarding (#24) — non-secret routing from the ConfigMap; the
            # HTTP bearer token comes from the Secret. The app forwards audit
            # events itself (no sidecar).
            - name: SIEM_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: SIEM_ENABLED
            - name: SIEM_METHODS
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: SIEM_METHODS
            - name: SIEM_MIN_SEVERITY
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: SIEM_MIN_SEVERITY
            - name: SIEM_SYSLOG_HOST
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: SIEM_SYSLOG_HOST
            - name: SIEM_SYSLOG_PORT
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: SIEM_SYSLOG_PORT
            - name: SIEM_SYSLOG_PROTOCOL
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: SIEM_SYSLOG_PROTOCOL
            - name: SIEM_HTTP_ENDPOINT
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: SIEM_HTTP_ENDPOINT
            - name: SIEM_HTTP_VERIFY_TLS
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: SIEM_HTTP_VERIFY_TLS
            - name: SIEM_HTTP_TOKEN
              valueFrom:
                secretKeyRef:
                  name: iceberg-ttx-secrets
                  key: SIEM_HTTP_TOKEN
            # OIDC / SSO (#25) — non-secret routing from the ConfigMap; the client
            # secrets come from the Secret. A disabled provider needs no secret.
            - name: AUTH_MODE
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: AUTH_MODE
            - name: OIDC_REDIRECT_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: OIDC_REDIRECT_BASE_URL
            - name: OIDC_ENTRA_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: OIDC_ENTRA_ENABLED
            - name: OIDC_ENTRA_TENANT_ID
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: OIDC_ENTRA_TENANT_ID
            - name: OIDC_ENTRA_CLIENT_ID
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: OIDC_ENTRA_CLIENT_ID
            - name: OIDC_ENTRA_ROLE_CLAIM
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: OIDC_ENTRA_ROLE_CLAIM
            - name: OIDC_ENTRA_ROLE_MAP
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: OIDC_ENTRA_ROLE_MAP
            - name: OIDC_ENTRA_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: iceberg-ttx-secrets
                  key: OIDC_ENTRA_CLIENT_SECRET
            - name: OIDC_AUTHENTIK_ENABLED
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: OIDC_AUTHENTIK_ENABLED
            - name: OIDC_AUTHENTIK_BASE_URL
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: OIDC_AUTHENTIK_BASE_URL
            - name: OIDC_AUTHENTIK_APP_SLUG
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: OIDC_AUTHENTIK_APP_SLUG
            - name: OIDC_AUTHENTIK_CLIENT_ID
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: OIDC_AUTHENTIK_CLIENT_ID
            - name: OIDC_AUTHENTIK_ROLE_MAP
              valueFrom:
                configMapKeyRef:
                  name: iceberg-ttx-config
                  key: OIDC_AUTHENTIK_ROLE_MAP
            - name: OIDC_AUTHENTIK_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: iceberg-ttx-secrets
                  key: OIDC_AUTHENTIK_CLIENT_SECRET
          volumeMounts:
            - name: uploads
              mountPath: /app/uploads
            - name: static-files
              mountPath: /app/static
            # Writable scratch for a read-only root filesystem.
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /api/health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 200m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 512Mi
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: app-uploads
        - name: static-files
          emptyDir: {}
        - name: tmp
          emptyDir: {}
