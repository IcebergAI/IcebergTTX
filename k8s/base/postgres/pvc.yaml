kind: PersistentVolumeClaim
metadata:
  name: postgres-data
  namespace: iceberg-ttx
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: iceberg-ttx
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 10Gi
