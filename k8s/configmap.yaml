apiVersion: v1
kind: ConfigMap
metadata:
  name: iceberg-ttx-config
  namespace: iceberg-ttx
data:
  ACCESS_TOKEN_EXPIRE_MINUTES: "480"
  # Trust X-Forwarded-For only from the nginx proxy (the sole ingress) so the app
  # sees the real client IP, not nginx (#36). Narrow to the nginx pod CIDR if the
  # app Service is ever exposed beyond the cluster-internal proxy.
  FORWARDED_ALLOW_IPS: "*"
  # SIEM forwarding (#24) — non-secret routing that seeds the admin-editable
  # /admin/audit config. The app forwards audit events itself (no sidecar); the
  # HTTP/syslog sink reaches an external collector via the app's egress (left open
  # in k8s/networkpolicy.yaml for the Anthropic API). The bearer token is a Secret
  # (SIEM_HTTP_TOKEN), never here. Enable + change methods live from /admin/audit.
  SIEM_ENABLED: "false"
  SIEM_METHODS: "stdout"
  SIEM_MIN_SEVERITY: "info"
  SIEM_SYSLOG_HOST: "localhost"
  SIEM_SYSLOG_PORT: "514"
  SIEM_SYSLOG_PROTOCOL: "UDP"
  SIEM_HTTP_ENDPOINT: ""
  SIEM_HTTP_VERIFY_TLS: "true"
  # OIDC / SSO (#25) — non-secret routing. Client secrets live in the Secret
  # (OIDC_*_CLIENT_SECRET), never here. AUTH_MODE=local|oidc|both. Enable a provider
  # and supply its client id / discovery inputs; set OIDC_REDIRECT_BASE_URL to the
  # public https URL so the callback matches the IdP's registered redirect URI.
  AUTH_MODE: "both"
  OIDC_REDIRECT_BASE_URL: ""
  OIDC_ENTRA_ENABLED: "false"
  OIDC_ENTRA_TENANT_ID: ""
  OIDC_ENTRA_CLIENT_ID: ""
  OIDC_ENTRA_ROLE_CLAIM: ""
  OIDC_ENTRA_ROLE_MAP: ""
  OIDC_AUTHENTIK_ENABLED: "false"
  OIDC_AUTHENTIK_BASE_URL: ""
  OIDC_AUTHENTIK_APP_SLUG: ""
  OIDC_AUTHENTIK_CLIENT_ID: ""
  OIDC_AUTHENTIK_ROLE_MAP: ""
