apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: postgres
  namespace: iceberg-ttx
  labels:
    app.kubernetes.io/name: postgres
    app.kubernetes.io/part-of: iceberg-ttx
spec:
  serviceName: postgres
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: postgres
  template:
    metadata:
      labels:
        app.kubernetes.io/name: postgres
        app.kubernetes.io/part-of: iceberg-ttx
    spec:
      automountServiceAccountToken: false
      # Run as the postgres uid (999) with fsGroup so the data PVC is writable
      # without starting as root. Requires a StorageClass that honours fsGroup.
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        runAsGroup: 999
        fsGroup: 999
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: postgres
          image: postgres:17
          securityContext:
            allowPrivilegeEscalation: false
            # Read-only rootfs (parity with the app/caddy/backup containers). The
            # data dir is the PVC below; Postgres also needs a writable socket dir
            # (/var/run/postgresql) and /tmp, provided as emptyDir mounts.
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 5432
              name: postgres
          env:
            - name: POSTGRES_USER
              value: iceberg_ttx
            - name: POSTGRES_DB
              value: iceberg_ttx
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: iceberg-ttx-secrets
                  key: POSTGRES_PASSWORD
          volumeMounts:
            - name: postgres-data
              mountPath: /var/lib/postgresql/data
            # Writable paths for a read-only rootfs: the postgres unix socket dir
            # and scratch. emptyDir so nothing persists outside the data PVC.
            - name: postgres-run
              mountPath: /var/run/postgresql
            - name: tmp
              mountPath: /tmp
          readinessProbe:
            exec:
              command: [pg_isready, -U, iceberg_ttx, -d, iceberg_ttx]
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 6
          livenessProbe:
            exec:
              command: [pg_isready, -U, iceberg_ttx, -d, iceberg_ttx]
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: postgres-data
          persistentVolumeClaim:
            claimName: postgres-data
        - name: postgres-run
          emptyDir: {}
        - name: tmp
          emptyDir: {}
