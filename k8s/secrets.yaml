# WARNING: Replace ALL placeholder values before applying to any environment.
# Never commit real secrets to version control.
# Consider Sealed Secrets, External Secrets Operator, or Vault for production.
#
# Generate SECRET_KEY:
#   python3 -c "import secrets; print(secrets.token_hex(32))"
#
# Generate POSTGRES_PASSWORD:
#   python3 -c "import secrets; print(secrets.token_urlsafe(32))"
#
# Base64-encode values:
#   echo -n 'your-value' | base64
#
# DATABASE_URL format:
#   postgresql://iceberg_ttx:<POSTGRES_PASSWORD>@postgres:5432/iceberg_ttx
apiVersion: v1
kind: Secret
metadata:
  name: iceberg-ttx-secrets
  namespace: iceberg-ttx
type: Opaque
data:
  # echo -n 'changeme' | base64
  POSTGRES_PASSWORD: Y2hhbmdlbWU=
  # echo -n 'postgresql://iceberg_ttx:changeme@postgres:5432/iceberg_ttx' | base64
  DATABASE_URL: cG9zdGdyZXNxbDovL2ljZWJlcmdfdHR4OmNoYW5nZW1lQHBvc3RncmVzOjU0MzIvaWNlYmVyZ190dHg=
  # echo -n 'change-me-to-64-char-hex-secret' | base64
  SECRET_KEY: Y2hhbmdlLW1lLXRvLTY0LWNoYXItaGV4LXNlY3JldA==
  # echo -n 'sk-ant-...' | base64  (leave empty if not using LLM)
  ANTHROPIC_API_KEY: ""
  # SIEM HTTP-sink bearer token (#24). Env-only secret — never stored in the DB or
  # returned by the API. Leave empty unless the SIEM 'http' method is enabled.
  # echo -n 'your-hec-or-webhook-token' | base64
  SIEM_HTTP_TOKEN: ""
