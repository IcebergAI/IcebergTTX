apiVersion: v1
kind: Service
metadata:
  name: nginx
  namespace: deep-thought
  labels:
    app.kubernetes.io/name: nginx
    app.kubernetes.io/part-of: deep-thought
spec:
  # Use LoadBalancer for cloud providers that provision one automatically.
  # Use ClusterIP + Ingress if your cluster has an Ingress controller.
  type: LoadBalancer
  selector:
    app.kubernetes.io/name: nginx
  ports:
    - port: 80
      targetPort: 80
      name: http
