apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: deep-thought
  labels:
    app.kubernetes.io/name: nginx
    app.kubernetes.io/part-of: deep-thought
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nginx
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nginx
        app.kubernetes.io/part-of: deep-thought
    spec:
      initContainers:
        # Copy compiled static assets from the app image into the local emptyDir.
        # nginx serves from this volume directly — no shared PVC required.
        # Uses the same image as the app so static files always match the
        # deployed version.
        - name: copy-static
          image: your-registry/deep-thought:latest  # REPLACE — same tag as app
          command: ["/bin/sh", "-c", "cp -a /app/static_src/. /app/static/"]
          volumeMounts:
            - name: static-files
              mountPath: /app/static
      containers:
        - name: nginx
          image: nginx:alpine
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            - name: static-files
              mountPath: /app/static
              readOnly: true
          readinessProbe:
            httpGet:
              path: /static/css/output.css
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /static/css/output.css
              port: 80
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
        - name: static-files
          emptyDir: {}
