apiVersion: apps/v1
kind: Deployment
metadata:
  name: nginx
  namespace: iceberg-ttx
  labels:
    app.kubernetes.io/name: nginx
    app.kubernetes.io/part-of: iceberg-ttx
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: nginx
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nginx
        app.kubernetes.io/part-of: iceberg-ttx
    spec:
      automountServiceAccountToken: false
      # nginxinc/nginx-unprivileged runs as uid 101; fsGroup lets the initContainer
      # and nginx share the static emptyDir.
      securityContext:
        runAsNonRoot: true
        runAsUser: 101
        runAsGroup: 101
        fsGroup: 101
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        # Copy compiled static assets from the app image into the local emptyDir.
        # nginx serves from this volume directly — no shared PVC required.
        # Uses the same image as the app so static files always match the
        # deployed version.
        - name: copy-static
          image: your-registry/iceberg-ttx:latest  # REPLACE — same tag as app
          # cp -rL (not -a): runs as non-root uid 101, so it must not try to
          # preserve the source files' ownership (uid 1000) — that chown would
          # fail. Static assets stay world-readable, which is all nginx needs.
          command: ["/bin/sh", "-c", "cp -rL /app/static_src/. /app/static/"]
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: static-files
              mountPath: /app/static
      containers:
        - name: nginx
          # Unprivileged image: runs as non-root and listens on 8080 (no
          # privileged-port bind, no added capabilities). TLS is terminated at
          # the Ingress in front (see ingress.yaml).
          image: nginxinc/nginx-unprivileged:alpine
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          ports:
            - containerPort: 8080
              name: http
          volumeMounts:
            - name: nginx-config
              mountPath: /etc/nginx/conf.d/default.conf
              subPath: default.conf
            - name: static-files
              mountPath: /app/static
              readOnly: true
          readinessProbe:
            httpGet:
              path: /static/css/output.css
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /static/css/output.css
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
      volumes:
        - name: nginx-config
          configMap:
            name: nginx-config
        - name: static-files
          emptyDir: {}
