upstream app_backend {
    server app:8000;
}

server {
    # 8080, not 80: the nginxinc/nginx-unprivileged image runs as a non-root
    # user (uid 101) and cannot bind privileged ports. TLS is terminated in
    # front (compose: a TLS-terminating proxy/LB; k8s: the Ingress), which
    # forwards here over the private network.
    listen 8080;
    server_name _;

    # Security headers on proxied app responses. HSTS assumes TLS is terminated
    # upstream (Ingress/LB) — harmless over plain HTTP on the private hop.
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Content-Security-Policy (#69). All scripts/styles/fonts/images are same-origin
    # (Alpine is self-hosted under /static/js) — no third-party origins are allowed.
    # 'unsafe-inline'/'unsafe-eval' are still required by the current stock AlpineJS
    # build (inline x-* expressions + new Function) and the inline theme/bootstrap
    # <script> blocks; tightening to a strict script-src needs the @alpinejs/csp
    # build + Alpine.data() migration (issue #69 step b). connect-src 'self' also
    # covers same-origin WebSocket upgrades.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self'; connect-src 'self'; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

    # Match app's 25 MB upload limit with a small buffer
    client_max_body_size 30m;

    # Serve compiled static assets directly — bypasses uvicorn entirely
    location /static/ {
        alias /app/static/;
        expires 7d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # WebSocket upgrade — must use HTTP/1.1 and forward Upgrade headers
    location /ws/ {
        proxy_pass http://app_backend;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket connections are long-lived — extend timeouts to 24 h
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_connect_timeout 10s;
    }

    # Everything else proxied to uvicorn
    location / {
        proxy_pass http://app_backend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Explicitly clear upgrade headers on non-WS requests
        proxy_set_header Upgrade "";
        proxy_set_header Connection "";
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        proxy_connect_timeout 10s;
        proxy_buffering on;
        proxy_buffer_size 4k;
        proxy_buffers 8 4k;
    }
}
