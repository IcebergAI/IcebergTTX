name: Bug report
description: Report a problem with IcebergTTX
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to file a bug report!

        **Do not report security vulnerabilities here.** Please follow
        [SECURITY.md](https://github.com/IcebergAI/IcebergTTX/blob/main/SECURITY.md)
        and use GitHub's private vulnerability reporting instead.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including what you expected to happen instead.
      placeholder: When I release an inject, the participant view does not update until I refresh.
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps that reliably trigger the bug.
      placeholder: |
        1. Create an exercise with scenario X
        2. Start it and release the first inject
        3. Observe the participant tab
    validations:
      required: true
  - type: dropdown
    id: deployment
    attributes:
      label: How are you running IcebergTTX?
      options:
        - Local dev (uvicorn --reload)
        - Docker Compose
        - Kubernetes
        - Other (describe below)
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Git commit SHA or image tag you are running.
      placeholder: 429982b
    validations:
      required: false
  - type: textarea
    id: logs
    attributes:
      label: Relevant logs or screenshots
      description: Paste any relevant log output or attach screenshots. This is automatically formatted as code.
      render: shell
    validations:
      required: false
