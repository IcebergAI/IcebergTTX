name: Feature request
description: Suggest an idea or enhancement for IcebergTTX
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: Thanks for suggesting an improvement!
  - type: textarea
    id: problem
    attributes:
      label: Problem / motivation
      description: What problem would this solve, or what need does it address? Is it related to a frustration you've hit?
      placeholder: As a facilitator, I can't reorder injects after a scenario is created, so...
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: Describe what you'd like to happen.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Any alternative solutions or workarounds you've considered.
    validations:
      required: false
  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Add any other context, mockups, or examples here.
    validations:
      required: false
