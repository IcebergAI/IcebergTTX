name: Release

# Publishes the container image to GHCR and creates a GitHub Release when a
# version tag is pushed (#73). SemVer tags: v1.2.3 (stable) or v1.2.3-beta.1
# (pre-release). workflow_dispatch is a build-only dry run by default.
on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build only — skip push, signing, and the GitHub Release"
        type: boolean
        default: true

# Least privilege by default; the release job elevates what it needs.
permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/icebergai/iceberg-ttx
  # true for a tag push, or a workflow_dispatch with dry_run unchecked.
  SHOULD_PUSH: ${{ github.event_name != 'workflow_dispatch' || !inputs.dry_run }}

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write # create the GitHub Release
      packages: write # push the image to GHCR
      id-token: write # cosign keyless signing + provenance OIDC
      attestations: write # actions/attest-build-provenance
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      # The tag is authoritative for the release, but the image version is baked
      # from pyproject.toml (via importlib.metadata). Fail the release if they
      # disagree, so a tag can never ship an image labelled a different version.
      - name: Verify tag matches pyproject version
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          python -m pip install --quiet packaging
          python - <<'PY'
          import os, sys, tomllib
          from packaging.version import Version

          tag = os.environ["GITHUB_REF_NAME"].lstrip("v")
          with open("pyproject.toml", "rb") as fh:
              proj = tomllib.load(fh)["project"]["version"]
          if Version(tag) != Version(proj):
              sys.exit(f"::error::tag {tag!r} != pyproject version {proj!r} — bump pyproject before tagging")
          print(f"OK: tag {tag} == pyproject version {proj}")
          PY

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3

      - name: Log in to GHCR
        if: env.SHOULD_PUSH == 'true'
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute image tags and labels
        id: meta
        uses: docker/metadata-action@c299e40c65443455700f0fdfc63efafe5b349051 # v5
        with:
          images: ${{ env.IMAGE }}
          # metadata-action suppresses `latest` and the {{major}}.{{minor}} tag
          # for pre-releases (…-beta.N), so beta builds only publish the full
          # version + sha tags.
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
          flavor: |
            latest=auto

      - name: Build and push image
        id: build
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: ${{ env.SHOULD_PUSH }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          sbom: true
          provenance: mode=max
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Attest build provenance (SLSA)
        if: env.SHOULD_PUSH == 'true'
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

      - name: Install cosign
        if: env.SHOULD_PUSH == 'true'
        uses: sigstore/cosign-installer@398d4b0eeef1380460a10c8013a76f728fb906ac # v3

      - name: Sign the image (keyless)
        if: env.SHOULD_PUSH == 'true'
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
        run: cosign sign --yes "${IMAGE}@${DIGEST}"

      # Use the runner's gh CLI rather than a third-party release action
      # (fewer actions to trust; zizmor superfluous-actions). Pre-release when the
      # tag carries a SemVer pre-release suffix (contains "-").
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/') && env.SHOULD_PUSH == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
          # docker/metadata-action normalises a SemVer Git tag such as
          # v0.1.0-beta.1 to the published OCI tag 0.1.0-beta.1.
          IMAGE_TAG: ${{ steps.meta.outputs.version }}
        run: |
          notes_file="$(mktemp)"
          {
            echo "Container image published to GHCR — SBOM + SLSA provenance attested, cosign-signed:"
            echo ""
            echo "    ${IMAGE}:${IMAGE_TAG}"
            echo ""
            echo "Pull, verify (cosign / attestation), and deploy instructions: docs/RELEASING.md."
          } > "$notes_file"
          args=(--title "$TAG" --generate-notes --notes-file "$notes_file")
          case "$TAG" in *-*) args+=(--prerelease) ;; esac
          gh release create "$TAG" "${args[@]}"
