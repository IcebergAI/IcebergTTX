name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: the test job only needs to read the repo contents.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.14"

      - name: Install dependencies
        run: pip install -e ".[dev]"

      - name: Lint
        run: ruff check app/ tests/

      # The test suite starts its own Postgres via testcontainers (Docker is
      # available on GitHub-hosted runners) and sets DATABASE_URL itself. To run
      # against an external Postgres instead, set DATABASE_URL_OVERRIDE_FOR_TESTS.
      - name: Test
        run: pytest
        env:
          SECRET_KEY: test-secret-key-for-ci
