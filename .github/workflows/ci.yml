name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: the test job only needs to read the repo contents.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          # zizmor artipacked: don't leave the repo token in .git/config —
          # nothing in this job pushes.
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      # Fail fast if pyproject deps changed without a matching uv.lock (#73):
      # the lockfile is the reproducible-build source of truth.
      - name: Verify lockfile is current
        run: uv lock --check

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check app/ tests/

      - name: Type check
        run: uv run pyright app/

      - name: Security scan (bandit)
        run: uv run bandit -c pyproject.toml -r app/

      - name: Dependency audit (pip-audit)
        # Warn-only: an unfixable transitive CVE should surface in the logs, not
        # block every PR. Tighten to a hard failure once findings are triaged.
        continue-on-error: true
        run: uv run pip-audit --skip-editable

      # The test suite starts its own Postgres via testcontainers (Docker is
      # available on GitHub-hosted runners) and sets DATABASE_URL itself. To run
      # against an external Postgres instead, set DATABASE_URL_OVERRIDE_FOR_TESTS.
      - name: Test
        run: uv run pytest
        env:
          SECRET_KEY: test-secret-key-for-ci

  ui:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: iceberg_ui
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d iceberg_ui"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/iceberg_ui
      DATABASE_URL_OVERRIDE_FOR_TESTS: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/iceberg_ui
      SECRET_KEY: test-secret-key-for-ui-ci
      DEV_MODE: "true"
      ICEBERG_TTX_UI_BASE: http://127.0.0.1:8765
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Install dependencies and Chromium
        run: |
          uv sync --extra dev
          uv run playwright install --with-deps chromium

      - name: Build Tailwind CSS
        run: uvx --from 'pytailwindcss==0.3.0' tailwindcss -i static/css/input.css -o static/css/output.css --minify

      - name: Replay legacy read-receipt migration
        env:
          PGPASSWORD: postgres
          MIGRATION_DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/iceberg_migration
        run: |
          createdb -h 127.0.0.1 -U postgres iceberg_migration
          DATABASE_URL="$MIGRATION_DATABASE_URL" uv run alembic upgrade 9c4f2a7d1e30
          psql -h 127.0.0.1 -U postgres -d iceberg_migration -v ON_ERROR_STOP=1 <<'SQL'
          INSERT INTO "user" (
            email, display_name, hashed_password, role, team, is_active,
            is_admin, must_change_password, created_at, auth_provider, subject
          ) VALUES (
            'migration@example.test', 'Migration User', NULL, 'participant', NULL,
            TRUE, FALSE, FALSE, CURRENT_TIMESTAMP, 'local', NULL
          );
          INSERT INTO scenario (
            title, description, version, tags, definition, created_by,
            created_at, updated_at
          ) VALUES (
            'Migration scenario', NULL, '1', '[]'::jsonb, '{}',
            (SELECT id FROM "user" WHERE email = 'migration@example.test'),
            CURRENT_TIMESTAMP, CURRENT_TIMESTAMP
          );
          INSERT INTO exercise (
            scenario_id, title, state, current_node_id, llm_enabled,
            started_at, ended_at, created_by, created_at
          ) VALUES (
            (SELECT id FROM scenario WHERE title = 'Migration scenario'),
            'Migration exercise', 'draft', NULL, FALSE, NULL, NULL,
            (SELECT id FROM "user" WHERE email = 'migration@example.test'),
            CURRENT_TIMESTAMP
          );
          INSERT INTO communication (
            exercise_id, sender_id, sender_team, direction, external_entity,
            subject, body, triggered_by_inject_id, visible_to_teams, sent_at, read_by
          ) VALUES (
            (SELECT id FROM exercise WHERE title = 'Migration exercise'),
            NULL, NULL, 'inbound', NULL, 'Legacy null', 'Body', NULL, NULL,
            CURRENT_TIMESTAMP, 'null'::jsonb
          );
          SQL
          DATABASE_URL="$MIGRATION_DATABASE_URL" uv run alembic upgrade head
          test "$(psql -h 127.0.0.1 -U postgres -d iceberg_migration -Atc \
            "SELECT count(*) FROM communicationread")" = "0"
          test "$(psql -h 127.0.0.1 -U postgres -d iceberg_migration -Atc \
            "SELECT count(*) FROM pg_attribute WHERE attrelid='communication'::regclass AND attname='read_by' AND NOT attisdropped")" = "0"

      - name: Apply migrations
        run: uv run alembic upgrade head

      # The pytest suite builds its schema with metadata.create_all, not Alembic, so it
      # stays green even when a model change has no matching migration. This is the only
      # thing that catches that drift.
      - name: Check migrations match the models
        run: uv run alembic check

      - name: Run authenticated Playwright suite
        run: |
          uv run uvicorn app.main:app --host 127.0.0.1 --port 8765 > /tmp/iceberg-ui.log 2>&1 &
          server_pid=$!
          cleanup() {
            status=$?
            kill "$server_pid" 2>/dev/null || true
            if [ "$status" -ne 0 ]; then
              cat /tmp/iceberg-ui.log
            fi
          }
          trap cleanup EXIT
          for _ in {1..30}; do
            if curl --fail --silent "$ICEBERG_TTX_UI_BASE/login" > /dev/null; then
              break
            fi
            sleep 1
          done
          curl --fail --silent "$ICEBERG_TTX_UI_BASE/login" > /dev/null
          uv run pytest -n0 tests/test_ui.py

  # Lint the hand-authored frontend (#278): djlint for the Jinja templates and
  # Biome for the hand-written CSS/JS. Both are lint-only and pinned by version;
  # djlint runs via uvx (config in [tool.djlint]) and Biome via its npm package
  # (config in biome.jsonc), so neither adds an unpinned third-party action.
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Lint Jinja templates (djlint)
        run: uvx djlint@1.42.1 app/templates --lint

      - name: Lint hand-authored CSS/JS (Biome)
        # Biome ships as a standalone binary with no project lockfile; installing the
        # pinned version ad hoc is intentional (same as actionlint below).
        # zizmor: ignore[adhoc-packages]
        run: |
          npm install -g @biomejs/biome@2.5.5
          biome lint

  # Lint the workflows themselves (#81): zizmor for CI/CD security risks
  # (injection sinks, unpinned actions, credential persistence — OWASP
  # CICD-SEC-1/3/4), actionlint for syntax + shellcheck of run: blocks.
  # Both are blocking — the workflows are currently clean.
  lint-workflows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"

      - name: Workflow security audit (zizmor)
        # GH_TOKEN enables zizmor's online audits (impostor commits,
        # known-vulnerable action versions); contents: read suffices.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pip install zizmor==1.26.1
          zizmor .github/workflows/

      - name: Workflow lint (actionlint)
        # Checksum-pinned release binary (no third-party action to trust).
        run: |
          curl -sSLo actionlint.tar.gz https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz
          echo "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8  actionlint.tar.gz" | sha256sum -c -
          tar xzf actionlint.tar.gz actionlint
          ./actionlint -no-color
