name: CI

on:
  push:
    branches: [main]
  pull_request:

# Least privilege: the test job only needs to read the repo contents.
permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          # zizmor artipacked: don't leave the repo token in .git/config —
          # nothing in this job pushes.
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      # Fail fast if pyproject deps changed without a matching uv.lock (#73):
      # the lockfile is the reproducible-build source of truth.
      - name: Verify lockfile is current
        run: uv lock --check

      - name: Install dependencies
        run: uv sync --extra dev

      - name: Lint
        run: uv run ruff check app/ tests/

      - name: Security scan (bandit)
        run: uv run bandit -c pyproject.toml -r app/

      - name: Dependency audit (pip-audit)
        # Warn-only: an unfixable transitive CVE should surface in the logs, not
        # block every PR. Tighten to a hard failure once findings are triaged.
        continue-on-error: true
        run: uv run pip-audit --skip-editable

      # The test suite starts its own Postgres via testcontainers (Docker is
      # available on GitHub-hosted runners) and sets DATABASE_URL itself. To run
      # against an external Postgres instead, set DATABASE_URL_OVERRIDE_FOR_TESTS.
      - name: Test
        run: uv run pytest
        env:
          SECRET_KEY: test-secret-key-for-ci

  ui:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: iceberg_ui
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres -d iceberg_ui"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/iceberg_ui
      DATABASE_URL_OVERRIDE_FOR_TESTS: postgresql+asyncpg://postgres:postgres@127.0.0.1:5432/iceberg_ui
      SECRET_KEY: test-secret-key-for-ui-ci
      DEV_MODE: "true"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"

      - name: Set up uv
        uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true

      - name: Install dependencies and Chromium
        run: |
          uv sync --extra dev
          uv run playwright install --with-deps chromium

      - name: Apply migrations
        run: uv run alembic upgrade head

      - name: Run authenticated Playwright suite
        run: |
          uv run uvicorn app.main:app --host 127.0.0.1 --port 8765 > /tmp/iceberg-ui.log 2>&1 &
          server_pid=$!
          trap 'kill "$server_pid" 2>/dev/null || true' EXIT
          for attempt in {1..30}; do
            if curl --fail --silent http://127.0.0.1:8765/login > /dev/null; then
              break
            fi
            sleep 1
          done
          if ! curl --fail --silent http://127.0.0.1:8765/login > /dev/null; then
            cat /tmp/iceberg-ui.log
            exit 1
          fi
          uv run pytest -n0 tests/test_ui.py

  # Lint the workflows themselves (#81): zizmor for CI/CD security risks
  # (injection sinks, unpinned actions, credential persistence — OWASP
  # CICD-SEC-1/3/4), actionlint for syntax + shellcheck of run: blocks.
  # Both are blocking — the workflows are currently clean.
  lint-workflows:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.14"

      - name: Workflow security audit (zizmor)
        # GH_TOKEN enables zizmor's online audits (impostor commits,
        # known-vulnerable action versions); contents: read suffices.
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pip install zizmor==1.26.1
          zizmor .github/workflows/

      - name: Workflow lint (actionlint)
        # Checksum-pinned release binary (no third-party action to trust).
        run: |
          curl -sSLo actionlint.tar.gz https://github.com/rhysd/actionlint/releases/download/v1.7.12/actionlint_1.7.12_linux_amd64.tar.gz
          echo "8aca8db96f1b94770f1b0d72b6dddcb1ebb8123cb3712530b08cc387b349a3d8  actionlint.tar.gz" | sha256sum -c -
          tar xzf actionlint.tar.gz actionlint
          ./actionlint -no-color
