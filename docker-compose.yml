services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: iceberg_ttx
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: iceberg_ttx
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - iceberg_ttx_net
    # Postgres' entrypoint needs its default caps to chown PGDATA and drop to the
    # postgres user, so caps are not dropped here; block privilege escalation.
    security_opt:
      - no-new-privileges:true
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U iceberg_ttx -d iceberg_ttx"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://iceberg_ttx:${POSTGRES_PASSWORD}@db:5432/iceberg_ttx
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-480}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      # Trust proxied X-Forwarded-For only from nginx (the sole ingress). See #36.
      FORWARDED_ALLOW_IPS: ${FORWARDED_ALLOW_IPS:-*}
      # SIEM forwarding (#24). The app forwards audit events itself (no sidecar);
      # these seed the admin-editable /admin/audit config. Outbound HTTP/syslog to
      # the collector works over the default bridge egress. SIEM_HTTP_TOKEN is a
      # secret — never logged or persisted.
      SIEM_ENABLED: ${SIEM_ENABLED:-false}
      SIEM_METHODS: ${SIEM_METHODS:-stdout}
      SIEM_MIN_SEVERITY: ${SIEM_MIN_SEVERITY:-info}
      SIEM_SYSLOG_HOST: ${SIEM_SYSLOG_HOST:-localhost}
      SIEM_SYSLOG_PORT: ${SIEM_SYSLOG_PORT:-514}
      SIEM_SYSLOG_PROTOCOL: ${SIEM_SYSLOG_PROTOCOL:-UDP}
      SIEM_HTTP_ENDPOINT: ${SIEM_HTTP_ENDPOINT:-}
      SIEM_HTTP_VERIFY_TLS: ${SIEM_HTTP_VERIFY_TLS:-true}
      SIEM_HTTP_TOKEN: ${SIEM_HTTP_TOKEN:-}
      # OIDC / SSO (#25). AUTH_MODE=local|oidc|both. Client secrets are secrets —
      # passed through from the .env, never logged or persisted.
      AUTH_MODE: ${AUTH_MODE:-both}
      OIDC_REDIRECT_BASE_URL: ${OIDC_REDIRECT_BASE_URL:-}
      OIDC_ENTRA_ENABLED: ${OIDC_ENTRA_ENABLED:-false}
      OIDC_ENTRA_TENANT_ID: ${OIDC_ENTRA_TENANT_ID:-}
      OIDC_ENTRA_CLIENT_ID: ${OIDC_ENTRA_CLIENT_ID:-}
      OIDC_ENTRA_CLIENT_SECRET: ${OIDC_ENTRA_CLIENT_SECRET:-}
      OIDC_ENTRA_ROLE_CLAIM: ${OIDC_ENTRA_ROLE_CLAIM:-}
      OIDC_ENTRA_ROLE_MAP: ${OIDC_ENTRA_ROLE_MAP:-}
      OIDC_AUTHENTIK_ENABLED: ${OIDC_AUTHENTIK_ENABLED:-false}
      OIDC_AUTHENTIK_BASE_URL: ${OIDC_AUTHENTIK_BASE_URL:-}
      OIDC_AUTHENTIK_APP_SLUG: ${OIDC_AUTHENTIK_APP_SLUG:-}
      OIDC_AUTHENTIK_CLIENT_ID: ${OIDC_AUTHENTIK_CLIENT_ID:-}
      OIDC_AUTHENTIK_CLIENT_SECRET: ${OIDC_AUTHENTIK_CLIENT_SECRET:-}
      OIDC_AUTHENTIK_ROLE_MAP: ${OIDC_AUTHENTIK_ROLE_MAP:-}
      OIDC_AUTH0_ENABLED: ${OIDC_AUTH0_ENABLED:-false}
      OIDC_AUTH0_DOMAIN: ${OIDC_AUTH0_DOMAIN:-}
      OIDC_AUTH0_CLIENT_ID: ${OIDC_AUTH0_CLIENT_ID:-}
      OIDC_AUTH0_CLIENT_SECRET: ${OIDC_AUTH0_CLIENT_SECRET:-}
      OIDC_AUTH0_ROLE_CLAIM: ${OIDC_AUTH0_ROLE_CLAIM:-}
      OIDC_AUTH0_ROLE_MAP: ${OIDC_AUTH0_ROLE_MAP:-}
      OIDC_OKTA_ENABLED: ${OIDC_OKTA_ENABLED:-false}
      OIDC_OKTA_DOMAIN: ${OIDC_OKTA_DOMAIN:-}
      OIDC_OKTA_AUTH_SERVER: ${OIDC_OKTA_AUTH_SERVER:-}
      OIDC_OKTA_CLIENT_ID: ${OIDC_OKTA_CLIENT_ID:-}
      OIDC_OKTA_CLIENT_SECRET: ${OIDC_OKTA_CLIENT_SECRET:-}
      OIDC_OKTA_ROLE_MAP: ${OIDC_OKTA_ROLE_MAP:-}
    volumes:
      - uploads:/app/uploads
      - static_files:/app/static
    networks:
      - iceberg_ttx_net
    # Copy static assets from the image-baked static_src/ into the shared
    # volume on every start so nginx always serves the current image version.
    entrypoint:
      - /bin/sh
      - -c
      - |
        cp -a /app/static_src/. /app/static/ &&
        exec uvicorn app.main:app --host 0.0.0.0 --port 8000 --proxy-headers
    expose:
      - "8000"
    # DB-aware readiness (#71): 503 when Postgres is unreachable. No curl/wget in
    # the slim image, so probe via Python stdlib (urllib raises on a 5xx status).
    healthcheck:
      test:
        - CMD
        - python
        - -c
        - import urllib.request; urllib.request.urlopen("http://localhost:8000/api/health/ready", timeout=5)
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    # App runs as non-root (USER appuser in the image) and needs no capabilities.
    # read_only root fs with a writable tmpfs for /tmp; uploads/static are volumes.
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL
    read_only: true
    tmpfs:
      - /tmp

  nginx:
    # Unprivileged image: runs as non-root (uid 101) and listens on 8080, so it
    # needs no added capabilities. For production, terminate TLS in front of this
    # (a TLS proxy / cloud LB) — do not serve the auth flow over plain HTTP.
    image: nginxinc/nginx-unprivileged:alpine
    restart: unless-stopped
    depends_on:
      app:
        condition: service_healthy
    ports:
      - "80:8080"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/app/static:ro
    networks:
      - iceberg_ttx_net
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - ALL

volumes:
  postgres_data:
  uploads:
  static_files:

networks:
  iceberg_ttx_net:
    driver: bridge
