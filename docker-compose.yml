services:
  db:
    image: postgres:17
    restart: unless-stopped
    environment:
      POSTGRES_USER: deep_thought
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: deep_thought
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - deep_thought_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U deep_thought -d deep_thought"]
      interval: 10s
      timeout: 5s
      retries: 5

  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://deep_thought:${POSTGRES_PASSWORD}@db:5432/deep_thought
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY is required}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-480}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
    volumes:
      - uploads:/app/uploads
      - static_files:/app/static
    networks:
      - deep_thought_net
    # Copy static assets from the image-baked static_src/ into the shared
    # volume on every start so nginx always serves the current image version.
    entrypoint:
      - /bin/sh
      - -c
      - |
        cp -a /app/static_src/. /app/static/ &&
        exec uvicorn app.main:app --host 0.0.0.0 --port 8000
    expose:
      - "8000"

  nginx:
    image: nginx:alpine
    restart: unless-stopped
    depends_on:
      - app
    ports:
      - "80:80"
    volumes:
      - ./docker/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - static_files:/app/static:ro
    networks:
      - deep_thought_net

volumes:
  postgres_data:
  uploads:
  static_files:

networks:
  deep_thought_net:
    driver: bridge
