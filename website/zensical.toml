# IcebergTTX documentation site — Zensical (Material-based) configuration.
# Styled to the shared Iceberg design system via docs/stylesheets/iceberg.css.

[project]
site_name = "IcebergTTX"
site_description = "Tabletop exercise platform for cyber incident and business-resilience scenarios."
site_author = "IcebergAI"
site_url = "https://icebergai.github.io/IcebergTTX/"

repo_url = "https://github.com/IcebergAI/IcebergTTX"
repo_name = "IcebergAI/IcebergTTX"

copyright = """
Copyright &copy; 2026 IcebergAI · <a href="https://github.com/IcebergAI/IcebergTTX/blob/main/LICENSE">License</a>
"""

# Self-hosted fonts first, then the Iceberg token map + component overrides.
extra_css = [
  "stylesheets/fonts.css",
  "stylesheets/iceberg.css",
]

nav = [
  { "Home" = "index.md" },
  { "Deployment" = "deployment.md" },
  { "Scenario authoring" = "scenarios.md" },
  { "Security" = "security.md" },
]

# ----------------------------------------------------------------------------
# Theme
# ----------------------------------------------------------------------------
[project.theme]
name = "material"
logo = "assets/icebergai-mark.svg"     # light-ink mark, reads on the dark header
favicon = "assets/favicon.png"
font = false                           # disable Google Fonts; we self-host (see fonts.css)

features = [
  "announce.dismiss",
  "content.code.annotate",
  "content.code.copy",
  "content.code.select",
  "content.tabs.link",
  "content.tooltips",
  "navigation.footer",
  "navigation.indexes",
  "navigation.instant",
  "navigation.instant.prefetch",
  "navigation.path",
  "navigation.sections",
  "navigation.top",
  "navigation.tracking",
  "search.highlight",
  "toc.follow",
]

# Light / dark toggle mirroring the app's dual theme. primary/accent = "custom"
# so the actual colours come from the --md-* overrides in iceberg.css.
[[project.theme.palette]]
scheme = "default"
primary = "custom"
accent = "custom"
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
scheme = "slate"
primary = "custom"
accent = "custom"
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/IcebergAI/IcebergTTX"

# ----------------------------------------------------------------------------
# Markdown extensions (carried over from the Zensical default template)
# ----------------------------------------------------------------------------
[project.markdown_extensions.abbr]
[project.markdown_extensions.admonition]
[project.markdown_extensions.attr_list]
[project.markdown_extensions.def_list]
[project.markdown_extensions.footnotes]
[project.markdown_extensions.md_in_html]
[project.markdown_extensions.toc]
permalink = true
[project.markdown_extensions.pymdownx.arithmatex]
generic = true
[project.markdown_extensions.pymdownx.betterem]
[project.markdown_extensions.pymdownx.caret]
[project.markdown_extensions.pymdownx.details]
[project.markdown_extensions.pymdownx.emoji]
emoji_generator = "zensical.extensions.emoji.to_svg"
emoji_index = "zensical.extensions.emoji.twemoji"
[project.markdown_extensions.pymdownx.highlight]
anchor_linenums = true
line_spans = "__span"
pygments_lang_class = true
[project.markdown_extensions.pymdownx.inlinehilite]
[project.markdown_extensions.pymdownx.keys]
[project.markdown_extensions.pymdownx.magiclink]
[project.markdown_extensions.pymdownx.mark]
[project.markdown_extensions.pymdownx.smartsymbols]
[project.markdown_extensions.pymdownx.superfences]
custom_fences = [
  { name = "mermaid", class = "mermaid", format = "pymdownx.superfences.fence_code_format" }
]
[project.markdown_extensions.pymdownx.tabbed]
alternate_style = true
combine_header_slug = true
[project.markdown_extensions.pymdownx.tasklist]
custom_checkbox = true
[project.markdown_extensions.pymdownx.tilde]
